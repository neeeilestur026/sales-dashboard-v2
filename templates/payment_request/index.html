<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Request Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/tool-css/tool-shared.css">
    <style>
        .file-list { list-style: none; padding: 0; margin: 0.5rem 0 0; }
        .file-list li {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg, #f1f5f9); border-radius: 6px; padding: 0.4rem 0.75rem;
            margin-bottom: 0.35rem; font-size: 0.85rem;
        }
        .file-list li .file-name { display: flex; align-items: center; gap: 0.4rem; }
        .file-list li .btn-remove {
            background: none; border: none; color: var(--danger, #ef4444); cursor: pointer;
            font-size: 1.1rem; padding: 0 0.25rem; line-height: 1;
        }
        .file-list li .btn-remove:hover { opacity: 0.7; }
        .drop-zone {
            border: 2px dashed var(--border, #e2e8f0); border-radius: 8px; padding: 1.5rem;
            text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
            color: var(--text-secondary, #64748b); font-size: 0.9rem;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary, #4f46e5); background: var(--primary-light, #eef2ff);
        }
        .output-log {
            background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 0.75rem 1rem;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; max-height: 200px;
            overflow-y: auto; margin-top: 1rem; display: none;
        }
        .output-log.visible { display: block; }
        .output-log .log-success { color: #34d399; }
        .output-log .log-error { color: #f87171; }
    </style>
</head>
<body>
<script>
(function(){var s;try{s=JSON.parse(localStorage.getItem('session'));}catch(e){}
if(!s||!s.token){window.location.href='/index.html';return;}
var exp=s.loginTime?Date.now()-s.loginTime:Infinity;if(exp>28800000){localStorage.removeItem('session');window.location.href='/index.html';}
})();
</script>

    <!-- Back to Dashboard -->
    <div class="container pt-3">
        <a id="backLink" href="/admin.html" class="btn btn-outline-secondary btn-sm mb-3">&larr; Back to Dashboard</a>
    </div>
    <script>
    (function(){try{var s=JSON.parse(localStorage.getItem('session'));if(s&&s.role==='sales')document.getElementById('backLink').href='/dashboard.html';else if(s&&s.role==='management')document.getElementById('backLink').href='/management-home.html';else if(s&&s.role==='accounting')document.getElementById('backLink').href='/accounting-home.html';}catch(e){}})();
    </script>

    <!-- Page header -->
    <div class="page-header">
        <div class="container">
            <h1>Payment Request Form</h1>
            <p>Fill in the details below to generate a payment request PDF and save to records.</p>
        </div>
    </div>

    <div class="container main-content">
        <form id="paymentForm" enctype="multipart/form-data">
            <div class="row g-4">

                <!-- Request Details -->
                <div class="col-md-6">
                    <div class="card section-gap">
                        <div class="card-header">
                            <div class="header-icon blue">
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>
                            </div>
                            <h5>Request Details</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-6">
                                    <label for="request_date" class="form-label">Request Date <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="request_date" name="request_date" required>
                                </div>
                                <div class="col-6">
                                    <label for="pr_number" class="form-label">PR Number</label>
                                    <input type="text" class="form-control" id="pr_number" name="pr_number" placeholder="Auto-generated if empty">
                                </div>
                                <div class="col-6">
                                    <label for="requested_by" class="form-label">Requested By <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="requested_by" name="requested_by" required>
                                </div>
                                <div class="col-6">
                                    <label for="department" class="form-label">Department</label>
                                    <input type="text" class="form-control" id="department" name="department">
                                </div>
                                <div class="col-12">
                                    <label for="purpose" class="form-label">Purpose / Description</label>
                                    <textarea class="form-control" id="purpose" name="purpose" rows="2" placeholder="Brief description of payment purpose"></textarea>
                                </div>
                                <div class="col-6">
                                    <label for="priority" class="form-label">Priority</label>
                                    <select class="form-select" id="priority" name="priority">
                                        <option value="Normal" selected>Normal</option>
                                        <option value="Urgent">Urgent</option>
                                        <option value="High">High</option>
                                        <option value="Low">Low</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Payee Information -->
                <div class="col-md-6">
                    <div class="card section-gap">
                        <div class="card-header">
                            <div class="header-icon green">
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </div>
                            <h5>Payee Information</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-8">
                                    <label for="payee_name" class="form-label">Payee Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="payee_name" name="payee_name" required>
                                </div>
                                <div class="col-4">
                                    <label for="payee_type" class="form-label">Payee Type</label>
                                    <select class="form-select" id="payee_type" name="payee_type">
                                        <option value="Supplier" selected>Supplier</option>
                                        <option value="Employee">Employee</option>
                                        <option value="Contractor">Contractor</option>
                                        <option value="Government">Government</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label for="bank_name" class="form-label">Bank Name</label>
                                    <input type="text" class="form-control" id="bank_name" name="bank_name">
                                </div>
                                <div class="col-6">
                                    <label for="bank_branch" class="form-label">Bank Branch</label>
                                    <input type="text" class="form-control" id="bank_branch" name="bank_branch">
                                </div>
                                <div class="col-6">
                                    <label for="account_name" class="form-label">Account Name</label>
                                    <input type="text" class="form-control" id="account_name" name="account_name">
                                </div>
                                <div class="col-6">
                                    <label for="account_number" class="form-label">Account Number</label>
                                    <input type="text" class="form-control" id="account_number" name="account_number">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Payment Information -->
                <div class="col-md-6">
                    <div class="card section-gap">
                        <div class="card-header">
                            <div class="header-icon amber">
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            </div>
                            <h5>Payment Information</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-6">
                                    <label for="payment_method" class="form-label">Payment Method <span class="text-danger">*</span></label>
                                    <select class="form-select" id="payment_method" name="payment_method" required>
                                        <option value="" disabled selected>Select method</option>
                                        <option value="Bank Transfer">Bank Transfer</option>
                                        <option value="Check">Check</option>
                                        <option value="Cash">Cash</option>
                                        <option value="Online Payment">Online Payment</option>
                                        <option value="Credit Card">Credit Card</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label for="currency" class="form-label">Currency</label>
                                    <select class="form-select" id="currency" name="currency">
                                        <option value="PHP" selected>PHP</option>
                                        <option value="USD">USD</option>
                                        <option value="EUR">EUR</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label for="amount" class="form-label">Amount <span class="text-danger">*</span></label>
                                    <input type="number" step="0.01" min="0" class="form-control" id="amount" name="amount" required placeholder="0.00">
                                </div>
                                <div class="col-6">
                                    <label for="due_date" class="form-label">Due Date</label>
                                    <input type="date" class="form-control" id="due_date" name="due_date">
                                </div>
                                <div class="col-12">
                                    <label for="remarks" class="form-label">Remarks / Notes</label>
                                    <textarea class="form-control" id="remarks" name="remarks" rows="2" placeholder="Additional notes"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Supporting Documents -->
                <div class="col-md-6">
                    <div class="card section-gap">
                        <div class="card-header">
                            <div class="header-icon purple">
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                            </div>
                            <h5>Supporting Documents</h5>
                        </div>
                        <div class="card-body">
                            <div id="dropZone" class="drop-zone" onclick="document.getElementById('fileInput').click()">
                                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:0.5rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                                <br>Drop files here or click to upload
                                <br><small>PNG, JPG, GIF, PDF — max 5 MB each</small>
                            </div>
                            <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.gif,.pdf" multiple style="display:none">
                            <ul class="file-list" id="fileList"></ul>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-2 mt-4 mb-3 flex-wrap">
                <button type="button" class="btn btn-primary" id="btnGenerate" onclick="generatePDF()">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:4px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Generate PDF
                </button>
                <button type="button" class="btn btn-success" id="btnSubmit" onclick="submitToSheets()">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:4px;"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    Save to Records
                </button>
                <button type="button" class="btn btn-outline-secondary" onclick="resetForm()">Reset</button>
            </div>

            <!-- Output log -->
            <div id="outputLog" class="output-log"></div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // ── Defaults ────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        // Set today's date
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('request_date').value = today;

        // Pre-fill requested_by from session if available
        try {
            const session = JSON.parse(localStorage.getItem('session'));
            if (session && session.name) {
                document.getElementById('requested_by').value = session.name;
            }
        } catch(e) {}
    });

    // ── File Upload ─────────────────────────────────────────
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');

    ['dragenter', 'dragover'].forEach(e => {
        dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); });
    });
    ['dragleave', 'drop'].forEach(e => {
        dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); });
    });
    dropZone.addEventListener('drop', ev => {
        const files = ev.dataTransfer.files;
        if (files.length) uploadFiles(files);
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) uploadFiles(fileInput.files);
        fileInput.value = '';
    });

    async function uploadFiles(files) {
        for (const file of files) {
            const fd = new FormData();
            fd.append('file', file);
            try {
                const res = await fetch('/payment-request/upload_file', { method: 'POST', body: fd });
                const json = await res.json();
                if (json.success) {
                    renderFileList(json.files);
                    logMsg(json.message, 'success');
                } else {
                    logMsg(json.message, 'error');
                }
            } catch (err) {
                logMsg('Upload failed: ' + err.message, 'error');
            }
        }
    }

    async function removeFile(index) {
        try {
            const res = await fetch(`/payment-request/remove_file/${index}`, { method: 'POST' });
            const json = await res.json();
            if (json.success) {
                renderFileList(json.files);
                logMsg(json.message, 'success');
            }
        } catch (err) {
            logMsg('Remove failed: ' + err.message, 'error');
        }
    }

    function renderFileList(files) {
        fileList.innerHTML = '';
        if (!files || !files.length) return;
        files.forEach(f => {
            const li = document.createElement('li');
            const ext = f.filename.split('.').pop().toLowerCase();
            const icon = ext === 'pdf' ? '📄' : '🖼️';
            li.innerHTML = `
                <span class="file-name">${icon} ${f.filename}</span>
                <button type="button" class="btn-remove" onclick="removeFile(${f.index})" title="Remove">&times;</button>
            `;
            fileList.appendChild(li);
        });
    }

    // ── Generate PDF ────────────────────────────────────────
    let _lastDriveLink = '';  // stored from response header for use in Save to Records

    async function generatePDF() {
        const form = document.getElementById('paymentForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const btn = document.getElementById('btnGenerate');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Generating...';

        try {
            const fd = new FormData(form);
            const res = await fetch('/payment-request/generate', { method: 'POST', body: fd });

            if (res.ok && res.headers.get('content-type')?.includes('application/pdf')) {
                _lastDriveLink = res.headers.get('X-Drive-Link') || '';
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const payee = document.getElementById('payee_name').value || 'Unknown';
                a.href = url;
                a.download = `Payment_Request_${payee.replace(/\s+/g, '_')}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                logMsg('PDF generated and downloaded. Click "Save to Records" to submit to the records sheet.', 'success');
            } else {
                const json = await res.json();
                logMsg(json.message || 'PDF generation failed.', 'error');
            }
        } catch (err) {
            logMsg('Error: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:4px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Generate PDF';
        }
    }

    // ── Submit to Sheets ────────────────────────────────────
    async function submitToSheets() {
        const form = document.getElementById('paymentForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Saving...';

        try {
            const data = {};
            new FormData(form).forEach((val, key) => { if (key !== 'file') data[key] = val; });
            if (_lastDriveLink) data.driveLink = _lastDriveLink;

            const res = await fetch('/payment-request/submit_to_sheets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            const json = await res.json();
            if (json.success) {
                logMsg('Saved to records successfully!', 'success');
            } else {
                logMsg(json.message || 'Failed to save.', 'error');
            }
        } catch (err) {
            logMsg('Error: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:4px;"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg> Save to Records';
        }
    }

    // ── Reset ───────────────────────────────────────────────
    function resetForm() {
        if (!confirm('Reset all fields and uploaded files?')) return;
        document.getElementById('paymentForm').reset();
        fileList.innerHTML = '';
        document.getElementById('outputLog').innerHTML = '';
        document.getElementById('outputLog').classList.remove('visible');

        // Reset date & name
        document.getElementById('request_date').value = new Date().toISOString().split('T')[0];
        try {
            const session = JSON.parse(localStorage.getItem('session'));
            if (session && session.name) document.getElementById('requested_by').value = session.name;
        } catch(e) {}

        // Clear server-side files
        fetch('/payment-request/upload_file', { method: 'POST', body: new FormData() }).catch(() => {});
    }

    // ── Log helper ──────────────────────────────────────────
    function logMsg(msg, type) {
        const log = document.getElementById('outputLog');
        log.classList.add('visible');
        const cls = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : '';
        const time = new Date().toLocaleTimeString();
        log.innerHTML += `<div class="${cls}">[${time}] ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }
    </script>
</body>
</html>
