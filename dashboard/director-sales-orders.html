<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Orders — Director Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ══ Bento reference design — self-contained ══ */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root{--ac:#4f46e5;--acd:#3730a3;--soft:#e0e7ff;--card:#fff;--tile2:#eef2f6;--line:#d7dce3;--ink:#111827;--ink2:#8b93a1;
      /* also retint the styles.css tokens so the shared navbar header matches (same as director-home) */
      --accent:#4f46e5;--accent-hover:#4338ca;--accent-dark:#3730a3;--accent-light:#e0e7ff;--accent-ring:rgba(79,70,229,.18);}
    body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:radial-gradient(1100px 560px at 12% -8%,#eef1f5,#e6e9ee 60%) !important;}
    .main-content{padding:104px 24px 40px !important;}
    .main-content > div{max-width:1200px;margin:0 auto;}
    .dso-head h1{font:800 26px/1 'Inter',sans-serif;letter-spacing:-.02em;color:var(--ink);margin:0;}
    .dso-head p{font:400 13.5px 'Inter',sans-serif;color:var(--ink2);margin:7px 0 0;}
    .btn{border-radius:999px;padding:10px 18px;font:600 12.5px 'Inter',sans-serif;background:#fff;color:var(--ink);border:1px solid var(--line);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .18s cubic-bezier(.4,0,.2,1);}
    .btn:hover{background:#f1f5f9;transform:translateY(-1px);}
    /* KPI tiles */
    .dso-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
    @media(max-width:760px){.dso-kpis{grid-template-columns:repeat(2,1fr);}}
    .dso-kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 17px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -18px rgba(15,23,42,.35);}
    .dso-kpi .lbl{font:600 11px 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);}
    .dso-kpi .val{font:800 24px 'Inter',sans-serif;color:var(--ink);font-variant-numeric:tabular-nums;margin-top:6px;}
    /* ranking panels */
    .dso-analytics{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
    @media(max-width:880px){.dso-analytics{grid-template-columns:1fr;}}
    .dso-panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 18px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -18px rgba(15,23,42,.35);}
    .dso-panel h3{margin:0 0 10px;font:700 11px 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);}
    .dso-rank{width:100%;border-collapse:collapse;font:400 12.5px 'Inter',sans-serif;}
    .dso-rank th{text-align:left;padding:6px 6px;color:var(--ink2);font:700 10px 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.04em;}
    .dso-rank td{padding:8px 6px;border-top:1px solid #eef1f5;color:var(--ink);font-variant-numeric:tabular-nums;}
    .dso-rank td .bar{display:block;height:5px;border-radius:3px;background:linear-gradient(90deg,#818cf8,#4f46e5);margin-top:5px;}
    /* toolbar + tabs */
    .dso-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
    .dso-toolbar input,.dso-toolbar select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-size:.85rem;}
    .dso-toolbar input:focus,.dso-toolbar select:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(79,70,229,.18);}
    .dso-search{flex:1;min-width:220px;}
    .dso-tab{padding:9px 15px;border-radius:999px;border:1px solid var(--line);background:#fff;color:#475569;font:600 12.5px 'Inter',sans-serif;cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);}
    .dso-tab:hover{border-color:#a5b4fc;color:var(--acd);}
    .dso-tab.active{background:linear-gradient(180deg,#6a63ea,#4f46e5);border-color:#4f46e5;color:#fff;box-shadow:0 6px 16px -8px rgba(79,70,229,.7);}
    /* table */
    .dso-count{font:400 12.5px 'Inter',sans-serif;color:var(--ink2);margin-bottom:8px;}
    .dso-card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -18px rgba(15,23,42,.35);}
    .dso-table{width:100%;border-collapse:collapse;font:400 12.5px 'Inter',sans-serif;}
    .dso-table th{text-align:left;padding:11px 13px;color:var(--ink2);border-bottom:1px solid #e5e9ef;font:700 10px 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.05em;background:#f4f6f9;}
    .dso-table td{padding:11px 13px;border-bottom:1px solid #eef1f5;color:var(--ink);}
    .dso-table tr.main-row{cursor:pointer;}
    .dso-table tr.main-row:hover td{background:#f5f7fb;}
    .dso-table tr.items-row td{padding:0;background:#f8fafc;}
    .dso-table tr.items-row.hidden{display:none;}
    .dso-inner{padding:.7rem 1rem .85rem 2rem;}
    .dso-items{width:100%;border-collapse:collapse;font:400 12px 'Inter',sans-serif;}
    .dso-items th{text-align:left;padding:6px 8px;color:var(--ink2);font:700 10px 'Inter',sans-serif;text-transform:uppercase;}
    .dso-items td{padding:6px 8px;color:var(--ink);border-top:1px solid #eef1f5;}
    .badge{display:inline-block;padding:3px 10px;border-radius:999px;font:700 10.5px 'Inter',sans-serif;}
    .badge-pending{background:#fef3c7;color:#b45309;}
    .badge-delivered{background:#dcfce7;color:#15803d;}
    .badge-cancelled{background:#fee2e2;color:#b91c1c;}
    .dso-chevron{display:inline-block;transition:transform .15s;color:var(--ink2);}
    .dso-chevron.open{transform:rotate(90deg);}
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="main-content">
    <div>
      <div class="dso-head" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;">
        <div>
          <h1>Sales Orders</h1>
          <p>Full order history with monthly/yearly filters and customer rankings.</p>
        </div>
        <button class="btn" onclick="loadSalesOrders()">↻ Refresh</button>
      </div>

      <div class="dso-kpis">
        <div class="dso-kpi"><div class="lbl">Total Orders</div><div class="val" id="kpiTotal">—</div></div>
        <div class="dso-kpi"><div class="lbl">Pending</div><div class="val" id="kpiPending" style="color:#c2410c;">—</div></div>
        <div class="dso-kpi"><div class="lbl">Delivered</div><div class="val" id="kpiDelivered" style="color:#15803d;">—</div></div>
        <div class="dso-kpi"><div class="lbl">Total Amount</div><div class="val" id="kpiAmount" style="color:#4f46e5;">—</div></div>
      </div>

      <div class="dso-analytics">
        <div class="dso-panel">
          <h3>Top Buyers (by Revenue)</h3>
          <table class="dso-rank">
            <thead><tr><th>#</th><th>Customer</th><th style="text-align:right;">Orders</th><th style="text-align:right;">Total</th></tr></thead>
            <tbody id="topBuyersBody"><tr><td colspan="4" style="color:var(--ink2);padding:.6rem 0;">—</td></tr></tbody>
          </table>
        </div>
        <div class="dso-panel">
          <h3>Least Active Buyers</h3>
          <table class="dso-rank">
            <thead><tr><th>#</th><th>Customer</th><th style="text-align:right;">Orders</th><th style="text-align:right;">Total</th></tr></thead>
            <tbody id="leastBuyersBody"><tr><td colspan="4" style="color:var(--ink2);padding:.6rem 0;">—</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="dso-toolbar">
        <input type="text" id="dsoSearch" class="dso-search" placeholder="Search SO No, customer, invoice…" oninput="applyFilters()">
        <label style="font:600 .78rem 'Inter',sans-serif;color:var(--ink2);">Month</label>
        <input type="month" id="dsoMonth" onchange="applyFilters()">
        <label style="font:600 .78rem 'Inter',sans-serif;color:var(--ink2);">Year</label>
        <select id="dsoYear" onchange="applyFilters()"><option value="">All</option></select>
        <button class="dso-tab" onclick="setStatus('all')" id="tabAll">All</button>
        <button class="dso-tab" onclick="setStatus('Pending')" id="tabPending">Pending</button>
        <button class="dso-tab" onclick="setStatus('Delivered')" id="tabDelivered">Delivered</button>
        <button class="dso-tab" onclick="clearAllFilters()">Clear</button>
      </div>

      <div class="dso-count" id="dsoCount"></div>

      <div class="dso-card">
        <table class="dso-table" id="dsoTable">
          <thead>
            <tr><th style="width:32px;"></th><th>SO No</th><th>Date</th><th>Customer</th><th>Status</th><th>Invoice #</th><th style="text-align:right;">Amount</th></tr>
          </thead>
          <tbody id="dsoBody"><tr><td colspan="7" style="text-align:center;color:var(--ink2);padding:1.5rem;">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      var session = (typeof requireDirector === 'function') ? requireDirector() : null;
      if (typeof requireDirector === 'function' && !session) return;
      if (typeof renderNavbar === 'function') renderNavbar('director-sales-orders');

      var allOrders = [];
      var activeStatus = 'all';
      var expanded = {};

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function php(n) {
        return '₱' + Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function dateVal(o) { return new Date(o.date || o.soDate || 0); }
      function fmtDate(d) {
        var dt = (d instanceof Date) ? d : new Date(d);
        if (isNaN(dt.getTime())) return String(d || '');
        return dt.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: '2-digit' });
      }

      function populateYears(orders) {
        var sel = document.getElementById('dsoYear');
        var years = {};
        orders.forEach(function (o) {
          var d = dateVal(o);
          if (!isNaN(d.getTime())) years[d.getFullYear()] = true;
        });
        var cur = sel.value;
        var list = Object.keys(years).sort(function (a, b) { return b - a; });
        sel.innerHTML = '<option value="">All</option>' + list.map(function (y) {
          return '<option value="' + y + '"' + (y === cur ? ' selected' : '') + '>' + y + '</option>';
        }).join('');
      }

      function setActiveTab() {
        ['All', 'Pending', 'Delivered'].forEach(function (s) {
          var el = document.getElementById('tab' + s);
          if (el) el.classList.toggle('active', activeStatus === (s === 'All' ? 'all' : s));
        });
      }

      window.setStatus = function (s) { activeStatus = s; setActiveTab(); applyFilters(); };

      window.clearAllFilters = function () {
        document.getElementById('dsoSearch').value = '';
        document.getElementById('dsoMonth').value = '';
        document.getElementById('dsoYear').value = '';
        activeStatus = 'all';
        setActiveTab();
        applyFilters();
      };

      window.applyFilters = function () {
        var search = (document.getElementById('dsoSearch').value || '').toLowerCase().trim();
        var month = document.getElementById('dsoMonth').value || '';
        var year = document.getElementById('dsoYear').value || '';

        var filtered = allOrders.filter(function (o) {
          if (activeStatus !== 'all') {
            var st = String(o.status || 'Pending');
            if (st !== activeStatus) return false;
          }
          var d = dateVal(o);
          if (!isNaN(d.getTime())) {
            if (month) {
              var ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
              if (ym !== month) return false;
            }
            if (year && String(d.getFullYear()) !== String(year)) return false;
          } else if (month || year) {
            return false;
          }
          if (search) {
            var hay = ((o.soNo || o.soNumber || '') + ' ' + (o.customerName || o.customer || '') + ' ' + (o.invoiceNo || '')).toLowerCase();
            if (hay.indexOf(search) < 0) return false;
          }
          return true;
        });

        renderKpis(filtered);
        renderRankings(filtered);
        renderTable(filtered);
      };

      function renderKpis(orders) {
        var pending = 0, delivered = 0, amount = 0;
        orders.forEach(function (o) {
          var st = String(o.status || 'Pending');
          if (st === 'Pending') pending++;
          else if (st === 'Delivered') delivered++;
          amount += Number(o.grandTotal || o.totalAmount || o.amount || 0);
        });
        document.getElementById('kpiTotal').textContent = orders.length;
        document.getElementById('kpiPending').textContent = pending;
        document.getElementById('kpiDelivered').textContent = delivered;
        document.getElementById('kpiAmount').textContent = php(amount);
      }

      function renderRankings(orders) {
        var agg = {};
        orders.forEach(function (o) {
          var name = String(o.customerName || o.customer || '—').trim() || '—';
          if (!agg[name]) agg[name] = { name: name, count: 0, total: 0 };
          agg[name].count += 1;
          agg[name].total += Number(o.grandTotal || o.totalAmount || o.amount || 0);
        });
        var list = Object.keys(agg).map(function (k) { return agg[k]; });

        var top = list.slice().sort(function (a, b) { return b.total - a.total; }).slice(0, 10);
        var least = list.slice().sort(function (a, b) { return a.total - b.total; }).slice(0, 10);
        var max = (top[0] && top[0].total) || 1;

        function rowsHtml(rows) {
          if (!rows.length) return '<tr><td colspan="4" style="color:var(--ink2);padding:0.6rem 0;">No data.</td></tr>';
          return rows.map(function (r, i) {
            var pct = Math.max(2, Math.round((r.total / max) * 100));
            return '<tr>' +
              '<td style="color:var(--ink2);">' + (i + 1) + '</td>' +
              '<td>' + esc(r.name) + '<span class="bar" style="width:' + pct + '%;"></span></td>' +
              '<td style="text-align:right;">' + r.count + '</td>' +
              '<td style="text-align:right;font-weight:600;">' + php(r.total) + '</td>' +
              '</tr>';
          }).join('');
        }
        document.getElementById('topBuyersBody').innerHTML = rowsHtml(top);
        document.getElementById('leastBuyersBody').innerHTML = rowsHtml(least);
      }

      function renderTable(orders) {
        var body = document.getElementById('dsoBody');
        var count = document.getElementById('dsoCount');
        count.textContent = 'Showing ' + orders.length + ' order' + (orders.length === 1 ? '' : 's');

        if (!orders.length) {
          body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--ink2);padding:1.5rem;">No sales orders match these filters.</td></tr>';
          return;
        }
        orders.sort(function (a, b) { return dateVal(b) - dateVal(a); });

        body.innerHTML = orders.map(function (o) {
          var soNo = o.soNo || o.soNumber || '';
          var st = String(o.status || 'Pending');
          var stClass = st.toLowerCase() === 'delivered' ? 'badge-delivered'
                      : st.toLowerCase() === 'cancelled' ? 'badge-cancelled'
                      : 'badge-pending';
          var amount = o.grandTotal || o.totalAmount || o.amount || 0;
          var isOpen = !!expanded[soNo];
          var items = Array.isArray(o.items) ? o.items : [];
          var itemsHtml = '';
          if (items.length) {
            itemsHtml = '<table class="dso-items">' +
              '<thead><tr><th>Product Code</th><th>Description</th><th style="text-align:right;">Qty</th><th style="text-align:right;">Unit Price</th><th style="text-align:right;">Amount</th></tr></thead><tbody>' +
              items.map(function (it) {
                return '<tr>' +
                  '<td>' + esc(it.productCode || '') + '</td>' +
                  '<td>' + esc(it.productDescription || '') + '</td>' +
                  '<td style="text-align:right;">' + Number(it.qty || 0) + '</td>' +
                  '<td style="text-align:right;">' + php(it.unitPrice) + '</td>' +
                  '<td style="text-align:right;">' + php(it.amount) + '</td>' +
                  '</tr>';
              }).join('') +
              '</tbody></table>';
          } else {
            itemsHtml = '<div style="color:var(--ink2);font-size:0.8rem;">No line items.</div>';
          }

          return '<tr class="main-row" onclick="toggleRow(\'' + esc(soNo).replace(/'/g, "\\'") + '\')">' +
              '<td><span class="dso-chevron ' + (isOpen ? 'open' : '') + '" id="chev-' + esc(soNo) + '">▶</span></td>' +
              '<td><strong>' + esc(soNo) + '</strong></td>' +
              '<td style="white-space:nowrap;color:var(--ink2);">' + esc(fmtDate(o.date || o.soDate)) + '</td>' +
              '<td>' + esc(o.customerName || o.customer || '') + '</td>' +
              '<td><span class="badge ' + stClass + '">' + esc(st) + '</span></td>' +
              '<td style="color:var(--ink2);font-size:0.82rem;">' + esc(o.invoiceNo || '—') + '</td>' +
              '<td style="font-weight:600;text-align:right;">' + php(amount) + '</td>' +
            '</tr>' +
            '<tr class="items-row ' + (isOpen ? '' : 'hidden') + '" id="items-' + esc(soNo) + '">' +
              '<td colspan="7"><div class="dso-inner">' + itemsHtml + '</div></td>' +
            '</tr>';
        }).join('');
      }

      window.toggleRow = function (soNo) {
        expanded[soNo] = !expanded[soNo];
        var row = document.getElementById('items-' + soNo);
        var chev = document.getElementById('chev-' + soNo);
        if (row) row.classList.toggle('hidden', !expanded[soNo]);
        if (chev) chev.classList.toggle('open', !!expanded[soNo]);
      };

      window.loadSalesOrders = function () {
        var body = document.getElementById('dsoBody');
        body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--ink2);padding:1.5rem;">Loading…</td></tr>';
        return fetchFromAPI({ action: 'getSalesOrders' }, { noCache: true })
          .then(function (res) {
            if (!res || !res.success) throw new Error((res && res.message) || 'Failed to load');
            allOrders = res.data || [];
            populateYears(allOrders);
            setActiveTab();
            applyFilters();
          })
          .catch(function (err) {
            console.error('loadSalesOrders failed', err);
            body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#ef4444;padding:1.5rem;">Failed to load sales orders.</td></tr>';
          });
      };

      document.addEventListener('DOMContentLoaded', function () { setActiveTab(); loadSalesOrders(); });
    })();
  </script>
</body>
</html>
