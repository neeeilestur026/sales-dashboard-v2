<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR-Marketing — Training & Development</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .trn-form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }
    .trn-form .full { grid-column: 1 / -1; }
    .trn-form label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted, #64748b); margin-bottom: 0.25rem; }
    .trn-form input, .trn-form select, .trn-form textarea {
      width: 100%; padding: 0.5rem 0.7rem; background: var(--surface-2, #1e293b);
      border: 1px solid var(--border, #334155); border-radius: 8px;
      color: var(--text-primary, #f1f5f9); font-size: 0.875rem; font-family: inherit;
    }
    .trn-form textarea { resize: vertical; min-height: 60px; }
    .trn-form input:focus, .trn-form select:focus, .trn-form textarea:focus { outline: none; border-color: var(--accent, #f97316); }
    .trn-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .trn-table th { text-align: left; padding: 0.6rem 0.75rem; color: var(--text-muted, #64748b); border-bottom: 1px solid var(--border, #334155); font-weight: 600; white-space: nowrap; }
    .trn-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #e2e8f0; color: var(--text-primary, #f1f5f9); }
    .trn-table tr:hover td { background: #e2e8f0; }
    .status-badge { padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; }
    .status-scheduled { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .status-inprogress { background: rgba(234,179,8,0.12); color: #eab308; }
    .status-completed { background: rgba(34,197,94,0.12); color: #22c55e; }
    .type-badge { padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; background: rgba(148,163,184,0.12); color: #94a3b8; }
    .form-section { display: none; }
    .form-section.open { display: block; }
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }
    .mini-stat { background: var(--surface-2, #1e293b); border: 1px solid var(--border, #334155); border-radius: 10px; padding: 0.75rem 1rem; text-align: center; }
    .mini-stat .num { font-size: 1.5rem; font-weight: 700; color: var(--text-primary, #f1f5f9); }
    .mini-stat .lbl { font-size: 0.68rem; color: var(--text-muted, #64748b); margin-top: 0.15rem; }
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { padding: 0.45rem 0.6rem; background: var(--surface-2, #1e293b); border: 1px solid var(--border, #334155); border-radius: 8px; color: var(--text-primary, #f1f5f9); font-size: 0.82rem; }
    .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: var(--accent, #f97316); }
    @media(max-width: 640px) { .trn-form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="main-content">
    <div class="page-header">
      <h1>Training & Development</h1>
      <p>Schedule and track employee training programs, workshops, and certifications.</p>
    </div>

    <!-- Stats -->
    <div class="stat-cards" id="statsRow"></div>

    <!-- Add/Edit Form -->
    <div class="chart-card" style="margin-bottom:1.5rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <h3 style="font-size:0.95rem;font-weight:600;color:var(--text-primary,#f1f5f9);display:flex;align-items:center;gap:0.4rem;" id="formTitle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Training Program
        </h3>
        <button class="btn btn-sm btn-secondary" onclick="toggleForm()">
          <span id="toggleLabel">Show Form</span>
        </button>
      </div>

      <div id="formSection" class="form-section">
        <form id="trnForm" onsubmit="submitTraining(event)">
          <input type="hidden" id="editRowIndex" value="">
          <div class="trn-form">
            <div>
              <label for="trnTitle">Title <span style="color:#ef4444;">*</span></label>
              <input type="text" id="trnTitle" placeholder="e.g. New Hire Orientation" required>
            </div>
            <div>
              <label for="trnType">Type <span style="color:#ef4444;">*</span></label>
              <select id="trnType" required>
                <option value="">Select type...</option>
                <option value="Orientation">Orientation</option>
                <option value="Workshop">Workshop</option>
                <option value="Seminar">Seminar</option>
                <option value="Webinar">Webinar</option>
                <option value="Certification">Certification</option>
              </select>
            </div>
            <div>
              <label for="trnInstructor">Instructor</label>
              <input type="text" id="trnInstructor" placeholder="e.g. Maria Santos">
            </div>
            <div>
              <label for="trnDate">Date</label>
              <input type="date" id="trnDate">
            </div>
            <div>
              <label for="trnDuration">Duration</label>
              <input type="text" id="trnDuration" placeholder="e.g. 2 hours">
            </div>
            <div>
              <label for="trnDepartment">Department</label>
              <input type="text" id="trnDepartment" placeholder="e.g. Marketing">
            </div>
            <div>
              <label for="trnStatus">Status</label>
              <select id="trnStatus">
                <option value="Scheduled">Scheduled</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
              </select>
            </div>
            <div class="full">
              <label for="trnAttendees">Attendees</label>
              <textarea id="trnAttendees" placeholder="List attendees, one per line or comma-separated..."></textarea>
            </div>
            <div class="full">
              <label for="trnNotes">Notes</label>
              <textarea id="trnNotes" placeholder="Additional notes..."></textarea>
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary" id="submitBtn">Add Program</button>
            <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancel</button>
          </div>
        </form>
        <div id="formMsg" style="display:none;padding:0.5rem;border-radius:8px;font-size:0.85rem;margin-top:0.5rem;"></div>
      </div>
    </div>

    <!-- Training Table -->
    <div class="chart-card">
      <h3 style="font-size:0.95rem;font-weight:600;color:var(--text-primary,#f1f5f9);margin-bottom:0.75rem;">All Training Programs</h3>
      <div class="filter-bar">
        <select id="filterStatus" onchange="filterTraining()">
          <option value="">All Statuses</option>
          <option value="Scheduled">Scheduled</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
        <select id="filterType" onchange="filterTraining()">
          <option value="">All Types</option>
          <option value="Orientation">Orientation</option>
          <option value="Workshop">Workshop</option>
          <option value="Seminar">Seminar</option>
          <option value="Webinar">Webinar</option>
          <option value="Certification">Certification</option>
        </select>
      </div>
      <div id="trnContainer" style="overflow-x:auto;">
        <div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/hr-training.js"></script>
</body>
</html>
