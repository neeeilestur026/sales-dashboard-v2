<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipment Monitoring</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
  <link rel="stylesheet" href="css/bento-skin-v2.css">
  <style>
    .sh-wrap { max-width: 1180px; margin: 0 auto; }
    .sh-toolbar { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.9rem; }
    .sh-toolbar input, .sh-toolbar select { padding: 0.45rem 0.6rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; background: #fff; }
    .sh-prog { display: inline-flex; align-items: center; gap: 0.4rem; }
    .sh-bar { width: 90px; height: 7px; border-radius: 99px; background: var(--bg-inset); overflow: hidden; }
    .sh-bar > span { display: block; height: 100%; background: var(--accent); }

    /* owner badges */
    .sm-owner-badge { display:inline-block; font-size:0.6rem; font-weight:700; line-height:1; padding:0.15rem 0.45rem; border-radius:99px; border:1px solid transparent; white-space:nowrap; }
    .sm-owner-sales { background:rgba(59,130,246,0.15); color:#2563eb; border-color:rgba(59,130,246,0.3); }
    .sm-owner-admin { background:rgba(100,116,139,0.18); color:#475569; border-color:rgba(100,116,139,0.35); }
    .sm-owner-sir-larry { background:rgba(168,85,247,0.15); color:#7c3aed; border-color:rgba(168,85,247,0.3); }
    .sm-owner-accounting { background:rgba(16,185,129,0.15); color:#059669; border-color:rgba(16,185,129,0.3); }
    .sm-owner-supplier { background:rgba(249,115,22,0.15); color:#ea580c; border-color:rgba(249,115,22,0.3); }
    .sm-owner-broker { background:rgba(245,158,11,0.15); color:#d97706; border-color:rgba(245,158,11,0.3); }
    .sm-owner-bank { background:rgba(6,182,212,0.15); color:#0891b2; border-color:rgba(6,182,212,0.3); }
    .sm-owner-forwarder { background:rgba(244,63,94,0.15); color:#e11d48; border-color:rgba(244,63,94,0.3); }

    /* timeline modal */
    .sh-overlay { display:none; position:fixed; inset:0; background:rgba(15,23,42,0.55); z-index:9999; overflow-y:auto; padding:1.5rem 1rem; backdrop-filter:blur(2px); }
    .sh-modal { max-width:760px; margin:0 auto; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; box-shadow:0 24px 64px rgba(0,0,0,0.25); }
    .sh-modal-head { padding:1.1rem 1.4rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; }
    .sh-modal-head h2 { margin:0; font-size:1.1rem; }
    .sh-modal-body { padding:1rem 1.4rem 1.5rem; }
    .sh-editgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:0.6rem; margin-bottom:1rem; }
    .sh-editgrid label { font-size:0.7rem; color:var(--text-muted); font-weight:600; display:block; margin-bottom:0.2rem; }
    .sh-editgrid input, .sh-editgrid select { width:100%; padding:0.4rem 0.5rem; border:1px solid var(--border); border-radius:7px; font-size:0.82rem; }
    .sh-phase { margin-top:1rem; }
    .sh-phase-h { font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:0.05em; color:var(--accent-dark); margin-bottom:0.4rem; }
    .sh-stage { border:1px solid var(--border); border-left-width:3px; border-radius:8px; padding:0.55rem 0.7rem; margin-bottom:0.4rem; }
    .sh-stage.done { border-left-color:#22c55e; background:rgba(34,197,94,0.04); }
    .sh-stage.skipped { border-left-color:#f59e0b; background:rgba(245,158,11,0.04); }
    .sh-stage.pending { border-left-color:var(--border); }
    .sh-stage-top { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
    .sh-dot { width:18px; height:18px; border-radius:50%; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; font-size:0.6rem; font-weight:700; }
    .sh-dot.done { background:rgba(34,197,94,0.2); color:#16a34a; }
    .sh-dot.skipped { background:rgba(245,158,11,0.2); color:#d97706; }
    .sh-dot.pending { background:var(--bg-inset); color:var(--text-muted); border:1px solid var(--border); }
    .sh-stage-label { font-weight:600; font-size:0.86rem; }
    .sh-auto { font-size:0.6rem; font-weight:700; background:rgba(13,148,136,0.14); color:#0f766e; border-radius:4px; padding:0.05rem 0.3rem; }
    .sh-stage-acts { display:flex; gap:0.35rem; margin-left:auto; }
    .sh-stage-acts button { font-size:0.72rem; padding:0.2rem 0.5rem; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; }
    .sh-stage-acts button:hover { border-color:var(--accent); color:var(--accent-dark); }
    .sh-stage-doc { font-size:0.72rem; color:var(--text-muted); margin-top:0.35rem; }
    .sh-docrow { display:flex; align-items:center; gap:0.4rem; font-size:0.76rem; margin-top:0.2rem; }
    .sh-meta { font-size:0.68rem; color:var(--text-muted); margin-top:0.2rem; }
    .dr-empty { padding:1.4rem; text-align:center; color:var(--text-muted); font-style:italic; font-size:0.86rem; }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="sh-wrap">
      <div id="flowNav"></div>
      <div class="chart-card">
        <div class="flow-actions" style="justify-content:space-between;">
          <h3 style="font-size:0.95rem;font-weight:600;">Shipment Monitoring <span style="font-weight:400;color:var(--text-muted,#64748b);font-size:0.8rem;">— auto-created per sales order; stages auto-advance with the flow</span></h3>
          <button class="btn btn-sm btn-secondary" onclick="loadShipments()">Refresh</button>
        </div>
        <div class="sh-toolbar">
          <input type="text" id="shSearch" placeholder="Search shipment / SO / customer…" style="min-width:200px;">
          <select id="shStatus">
            <option value="">All statuses</option>
            <option>Pending</option><option>In Transit</option><option>Arrived</option><option>Delivered</option>
          </select>
          <span id="shMeta" style="margin-left:auto;font-size:0.78rem;color:var(--text-muted,#64748b);"></span>
        </div>
        <div id="shList" style="overflow-x:auto;"><div class="dr-empty">Loading…</div></div>
      </div>
    </div>
  </main>

  <!-- Timeline modal -->
  <div class="sh-overlay" id="shOverlay" onclick="if(event.target===this)shClose()">
    <div class="sh-modal">
      <div class="sh-modal-head">
        <div>
          <h2 id="shTlTitle">—</h2>
          <div style="font-size:0.78rem;color:var(--text-muted,#64748b);" id="shTlSub">—</div>
        </div>
        <button onclick="shClose()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-muted,#64748b);line-height:1;">×</button>
      </div>
      <div class="sh-modal-body" id="shTlBody"><div class="dr-empty">Loading…</div></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/stage-meta.js"></script>
  <script src="js/flow-shipments.js"></script>
</body>
</html>
