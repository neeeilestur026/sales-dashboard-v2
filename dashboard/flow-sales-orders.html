<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — Sales Orders</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;">
      <div>
        <h1>Sales Orders</h1>
        <p>Load a quotation, then edit quantities or remove items before saving.</p>
      </div>
      <a href="migrate-sales-orders.html" class="btn btn-sm btn-secondary" style="white-space:nowrap;">⤓ Import legacy Sales Orders</a>
    </div>
    <div class="flow-nav" id="flowNav"></div>

    <div class="chart-card" style="margin-bottom:1.25rem;">
      <h3 style="font-size:0.95rem;font-weight:600;margin-bottom:0.75rem;" id="formTitle">New Sales Order</h3>
      <input type="hidden" id="soNo" value="">
      <div class="flow-form">
        <div><label>Load Quotation</label><select id="loadQuotation" onchange="loadFromQuotation()"></select></div>
        <div><label>Source Quotation No</label><input type="text" id="quotationNo" readonly></div>
        <div><label>Customer *</label><input type="text" id="customer" required></div>
        <div><label>Date <span style="font-weight:400;color:var(--text-muted,#64748b);">(can be back-dated, e.g. 2024 / 2025, to record historical orders)</span></label><input type="date" id="date"></div>
        <div><label>Status</label><select id="status"><option>Open</option><option>Delivered</option><option>Invoiced</option><option>Closed</option></select></div>
        <div><label>Supplier Type <span style="font-weight:400;color:var(--text-muted,#64748b);">(label)</span></label><select id="soSupplierType"><option value="">—</option><option>Local</option><option>International</option></select></div>
      </div>

      <table class="flow-table flow-items" style="margin-top:0.5rem;">
        <thead><tr><th style="width:34%;">Item</th><th class="num" style="width:14%;">Qty</th><th class="num" style="width:18%;">Price/Unit</th><th class="num" style="width:18%;">Total Price</th><th></th></tr></thead>
        <tbody id="itemRows"></tbody>
      </table>
      <div class="flow-actions">
        <button type="button" class="btn btn-sm btn-secondary" onclick="addRow()">+ Add line</button>
        <span style="margin-left:auto;font-weight:700;">Total Sales Order: <span id="grandTotal">0.00</span></span>
      </div>

      <div class="flow-actions">
        <button type="button" class="btn btn-primary" id="saveBtn" onclick="saveSO()">Save Sales Order</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
      </div>
      <div id="formMsg" class="flow-msg" style="display:none;"></div>
    </div>

    <div class="chart-card">
      <div class="flow-actions" style="justify-content:space-between;">
        <h3 style="font-size:0.95rem;font-weight:600;">Sales Orders</h3>
        <button class="btn btn-sm btn-secondary" onclick="loadSOs()">Refresh</button>
      </div>
      <div class="flow-actions" style="gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem;">
        <input type="text" id="soSearch" placeholder="Search SO / quotation…" style="padding:0.4rem 0.6rem;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:0.85rem;min-width:180px;">
        <select id="soYear" style="padding:0.4rem 0.6rem;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:0.85rem;"></select>
        <select id="soMonth" style="padding:0.4rem 0.6rem;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:0.85rem;">
          <option value="">All months</option>
          <option value="01">January</option><option value="02">February</option><option value="03">March</option>
          <option value="04">April</option><option value="05">May</option><option value="06">June</option>
          <option value="07">July</option><option value="08">August</option><option value="09">September</option>
          <option value="10">October</option><option value="11">November</option><option value="12">December</option>
        </select>
        <select id="soCustomer" style="padding:0.4rem 0.6rem;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:0.85rem;"><option value="">All customers</option></select>
        <span id="soFilterMeta" style="margin-left:auto;font-size:0.78rem;color:var(--text-muted,#64748b);"></span>
      </div>
      <div id="listContainer" style="overflow-x:auto;"><div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/flow-docs.js"></script>
  <script src="js/so-cost-editor.js"></script>
  <script src="js/flow-sales-orders.js"></script>
</body>
</html>
