<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — Sales Orders</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="page-header">
      <h1>Sales Orders</h1>
      <p>Load a quotation, then edit quantities or remove items before saving.</p>
    </div>
    <div class="flow-nav" id="flowNav"></div>

    <div class="chart-card" style="margin-bottom:1.25rem;">
      <h3 style="font-size:0.95rem;font-weight:600;margin-bottom:0.75rem;" id="formTitle">New Sales Order</h3>
      <input type="hidden" id="soNo" value="">
      <div class="flow-form">
        <div><label>Load Quotation</label><select id="loadQuotation" onchange="loadFromQuotation()"></select></div>
        <div><label>Source Quotation No</label><input type="text" id="quotationNo" readonly></div>
        <div><label>Customer *</label><input type="text" id="customer" required></div>
        <div><label>Date</label><input type="date" id="date"></div>
        <div><label>Status</label><select id="status"><option>Open</option><option>Delivered</option><option>Invoiced</option><option>Closed</option></select></div>
      </div>

      <table class="flow-table flow-items" style="margin-top:0.5rem;">
        <thead><tr><th style="width:34%;">Item</th><th class="num" style="width:14%;">Qty</th><th class="num" style="width:18%;">Price/Unit</th><th class="num" style="width:18%;">Total Price</th><th></th></tr></thead>
        <tbody id="itemRows"></tbody>
      </table>
      <div class="flow-actions">
        <button type="button" class="btn btn-sm btn-secondary" onclick="addRow()">+ Add line</button>
        <span style="margin-left:auto;font-weight:700;">Total Sales Order: <span id="grandTotal">0.00</span></span>
      </div>

      <div class="flow-actions">
        <button type="button" class="btn btn-primary" id="saveBtn" onclick="saveSO()">Save Sales Order</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
      </div>
      <div id="formMsg" class="flow-msg" style="display:none;"></div>
    </div>

    <div class="chart-card">
      <div class="flow-actions" style="justify-content:space-between;">
        <h3 style="font-size:0.95rem;font-weight:600;">Sales Orders</h3>
        <button class="btn btn-sm btn-secondary" onclick="loadSOs()">Refresh</button>
      </div>
      <div id="listContainer" style="overflow-x:auto;"><div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/flow-docs.js"></script>
  <script src="js/flow-sales-orders.js"></script>
</body>
</html>
