<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR-Marketing — Accreditations & Compliance</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .acc-form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }
    .acc-form .full { grid-column: 1 / -1; }
    .acc-form label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted, #64748b); margin-bottom: 0.25rem; }
    .acc-form input, .acc-form select, .acc-form textarea {
      width: 100%; padding: 0.5rem 0.7rem; background: var(--surface-2, #1e293b);
      border: 1px solid var(--border, #334155); border-radius: 8px;
      color: var(--text-primary, #f1f5f9); font-size: 0.875rem; font-family: inherit;
    }
    .acc-form textarea { resize: vertical; min-height: 60px; }
    .acc-form input:focus, .acc-form select:focus, .acc-form textarea:focus { outline: none; border-color: var(--accent, #f97316); }
    .acc-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .acc-table th { text-align: left; padding: 0.6rem 0.75rem; color: var(--text-muted, #64748b); border-bottom: 1px solid var(--border, #334155); font-weight: 600; white-space: nowrap; }
    .acc-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #e2e8f0; color: var(--text-primary, #f1f5f9); }
    .acc-table tr:hover td { background: #e2e8f0; }
    .acc-table tr.row-expiring td { background: rgba(249,115,22,0.08); }
    .acc-table tr.row-expired td { background: rgba(239,68,68,0.06); }
    .status-badge { padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; }
    .status-active { background: rgba(34,197,94,0.12); color: #22c55e; }
    .status-pending { background: rgba(234,179,8,0.12); color: #eab308; }
    .status-expired { background: rgba(239,68,68,0.12); color: #ef4444; }
    .status-expiring { background: rgba(249,115,22,0.12); color: #f97316; }
    .form-section { display: none; }
    .form-section.open { display: block; }
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .filter-bar select, .filter-bar input { padding: 0.45rem 0.6rem; background: var(--surface-2, #1e293b); border: 1px solid var(--border, #334155); border-radius: 8px; color: var(--text-primary, #f1f5f9); font-size: 0.82rem; }
    .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: var(--accent, #f97316); }
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }
    .mini-stat { background: var(--surface-2, #1e293b); border: 1px solid var(--border, #334155); border-radius: 10px; padding: 0.75rem 1rem; text-align: center; }
    .mini-stat .num { font-size: 1.5rem; font-weight: 700; color: var(--text-primary, #f1f5f9); }
    .mini-stat .lbl { font-size: 0.72rem; color: var(--text-muted, #64748b); margin-top: 0.15rem; }
    .num-expiring { color: #f97316 !important; }
    .num-expired { color: #ef4444 !important; }
    .doc-link { color: #3b82f6; text-decoration: none; font-size: 0.8rem; }
    .doc-link:hover { text-decoration: underline; }
    @media(max-width: 640px) { .acc-form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="main-content">
    <div class="page-header">
      <h1>Accreditations & Compliance</h1>
      <p>Track certifications, licenses, and compliance deadlines.</p>
    </div>

    <!-- Stats -->
    <div class="stat-cards" id="statsRow">
      <div class="mini-stat"><div class="num" id="statActive">-</div><div class="lbl">Active</div></div>
      <div class="mini-stat"><div class="num num-expiring" id="statExpiring">-</div><div class="lbl">Expiring Soon</div></div>
      <div class="mini-stat"><div class="num num-expired" id="statExpired">-</div><div class="lbl">Expired</div></div>
    </div>

    <!-- Add/Edit Form -->
    <div class="chart-card" style="margin-bottom:1.5rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <h3 style="font-size:0.95rem;font-weight:600;color:var(--text-primary,#f1f5f9);display:flex;align-items:center;gap:0.4rem;" id="formTitle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Accreditation
        </h3>
        <button class="btn btn-sm btn-secondary" onclick="toggleForm()">
          <span id="toggleLabel">Show Form</span>
        </button>
      </div>

      <div id="formSection" class="form-section">
        <form id="accForm" onsubmit="submitAccreditation(event)">
          <input type="hidden" id="editRowIndex" value="">
          <div class="acc-form">
            <div>
              <label for="accName">Name <span style="color:#ef4444;">*</span></label>
              <input type="text" id="accName" placeholder="e.g. ISO 9001 Certification" required>
            </div>
            <div>
              <label for="accIssuingBody">Issuing Body <span style="color:#ef4444;">*</span></label>
              <input type="text" id="accIssuingBody" placeholder="e.g. Bureau Veritas" required>
            </div>
            <div>
              <label for="accDateIssued">Date Issued</label>
              <input type="date" id="accDateIssued">
            </div>
            <div>
              <label for="accExpiryDate">Expiry Date</label>
              <input type="date" id="accExpiryDate">
            </div>
            <div>
              <label for="accStatus">Status</label>
              <select id="accStatus">
                <option value="Active">Active</option>
                <option value="Pending">Pending</option>
                <option value="Expired">Expired</option>
              </select>
            </div>
            <div>
              <label for="accDocLink">Document Link</label>
              <input type="url" id="accDocLink" placeholder="https://...">
            </div>
            <div class="full">
              <label for="accNotes">Notes</label>
              <textarea id="accNotes" placeholder="Additional notes..."></textarea>
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary" id="submitBtn">Add Accreditation</button>
            <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancel</button>
          </div>
        </form>
        <div id="formMsg" style="display:none;padding:0.5rem;border-radius:8px;font-size:0.85rem;margin-top:0.5rem;"></div>
      </div>
    </div>

    <!-- Accreditations Table -->
    <div class="chart-card">
      <h3 style="font-size:0.95rem;font-weight:600;color:var(--text-primary,#f1f5f9);margin-bottom:0.75rem;">All Accreditations</h3>
      <div class="filter-bar">
        <select id="filterStatus" onchange="filterAccreditations()">
          <option value="">All Statuses</option>
          <option value="Active">Active</option>
          <option value="Expiring Soon">Expiring Soon</option>
          <option value="Expired">Expired</option>
          <option value="Pending">Pending</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search accreditations..." oninput="renderTable()">
      </div>
      <div id="accContainer" style="overflow-x:auto;">
        <div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/hr-accreditations.js"></script>
</body>
</html>
