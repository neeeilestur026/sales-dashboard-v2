<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — Collections</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="page-header">
      <h1>Collections</h1>
      <p>Every amount collected against a sales order's invoice. Filter by sales order, client, month or year.</p>
    </div>
    <div class="flow-nav" id="flowNav"></div>

    <div class="chart-card" style="margin-bottom:1.25rem;">
      <div class="flow-form" style="margin-bottom:0;">
        <div><label>Sales Order</label><select id="fSO"><option value="">All sales orders</option></select></div>
        <div><label>Client</label><select id="fClient"><option value="">All clients</option></select></div>
        <div><label>Year</label><select id="fYear"><option value="">All years</option></select></div>
        <div><label>Month</label><select id="fMonth">
          <option value="">All months</option>
          <option value="01">January</option><option value="02">February</option><option value="03">March</option>
          <option value="04">April</option><option value="05">May</option><option value="06">June</option>
          <option value="07">July</option><option value="08">August</option><option value="09">September</option>
          <option value="10">October</option><option value="11">November</option><option value="12">December</option>
        </select></div>
      </div>
      <div class="flow-actions" style="margin-top:0.5rem;">
        <button class="btn btn-sm btn-secondary" onclick="resetFilters()">Clear filters</button>
        <button class="btn btn-sm btn-secondary" onclick="loadCollections()" style="margin-left:auto;">Refresh</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.25rem;">
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiOut">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Outstanding (PHP)</div></div>
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiTotal">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Collected (PHP)</div></div>
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiPending">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Pending Invoices</div></div>
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiClients">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Distinct Clients</div></div>
    </div>

    <div class="chart-card" style="margin-bottom:1.25rem;">
      <h3 style="font-size:0.95rem;font-weight:600;margin-bottom:0.5rem;">Receivables — invoice status</h3>
      <div id="arContainer" style="overflow-x:auto;"><div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div></div>
    </div>

    <div class="chart-card">
      <h3 style="font-size:0.95rem;font-weight:600;margin-bottom:0.5rem;">Collection Ledger <span id="kpiCount" style="font-weight:500;color:var(--text-muted,#64748b);font-size:0.8rem;"></span></h3>
      <div id="container" style="overflow-x:auto;"><div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/flow-collections.js"></script>
</body>
</html>
