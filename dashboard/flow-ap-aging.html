<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — AP Aging</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
  <link rel="stylesheet" href="css/bento-skin-v2.css">


</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="page-header">
      <h1>Accounts Payable Aging</h1>
      <p>Auto-generated from purchase orders. The PO amount arrives in its original currency — enter the PHP total and track payment here.</p>
    </div>
    <div class="flow-nav" id="flowNav"></div>

    <div class="inv-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.25rem;">
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiCount">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Unpaid Entries</div></div>
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiUnpaid">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Unpaid Total (PHP)</div></div>
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiPaid">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Paid Total (PHP)</div></div>
    </div>

    <div class="chart-card">
      <div class="flow-actions" style="justify-content:space-between;">
        <h3 style="font-size:0.95rem;font-weight:600;">Payables</h3>
        <button class="btn btn-sm btn-secondary" onclick="loadAP()">Refresh</button>
      </div>
      <div id="container" style="overflow-x:auto;"><div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div></div>
      <div id="msg" class="flow-msg" style="display:none;"></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/flow-docs.js"></script>
  <script src="js/flow-ap-aging.js"></script>
</body>
</html>
