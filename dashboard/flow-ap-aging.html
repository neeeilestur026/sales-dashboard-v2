<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — AP Aging</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">


  <!-- ══ Bento reference skin (indigo) — additive; tokens + card/pill restyle, no markup/JS changes ══ -->
  <style id="bento-skin">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root{
      --accent:#4f46e5; --accent-hover:#4338ca; --accent-dark:#3730a3; --accent-light:#e0e7ff;
      --accent-ring:rgba(79,70,229,.18);
      --radius:16px; --radius-lg:20px; --radius-sm:10px;
    }
    body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:radial-gradient(1100px 560px at 12% -8%,#eef1f5,#eef2f6 60%) !important;}
    .page-header h1{font:800 26px/1 'Inter',sans-serif !important;letter-spacing:-.02em;}
    .page-header p{font:400 13.5px 'Inter',sans-serif;color:var(--text-muted);}
    .chart-card,.stat-card,.kpi-card{border-radius:18px !important;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -18px rgba(15,23,42,.35) !important;border:1px solid var(--border) !important;}
    .btn,.btn-primary,.btn-secondary,.btn-sm{border-radius:999px !important;font-weight:600 !important;transition:transform .18s cubic-bezier(.4,0,.2,1),filter .18s,background .2s !important;}
    .btn-primary{background:linear-gradient(180deg,#6a63ea,#4f46e5) !important;color:#fff !important;border:none !important;box-shadow:0 6px 16px -8px rgba(79,70,229,.7) !important;}
    .btn-primary:hover{filter:brightness(1.06);transform:translateY(-1px);}
    .btn-secondary{background:#fff !important;color:var(--text-primary) !important;border:1px solid var(--border) !important;}
    input,select,textarea{border-radius:9px !important;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent) !important;box-shadow:0 0 0 3px var(--accent-ring) !important;}
    .flow-modal{border-radius:20px !important;}
    @media (prefers-reduced-motion:reduce){.btn,.btn-primary{transition:none !important;}}
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="page-header">
      <h1>Accounts Payable Aging</h1>
      <p>Auto-generated from purchase orders. The PO amount arrives in its original currency — enter the PHP total and track payment here.</p>
    </div>
    <div class="flow-nav" id="flowNav"></div>

    <div class="inv-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.25rem;">
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiCount">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Unpaid Entries</div></div>
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiUnpaid">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Unpaid Total (PHP)</div></div>
      <div class="chart-card" style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;" id="kpiPaid">--</div><div style="font-size:0.72rem;color:var(--text-muted,#64748b);text-transform:uppercase;">Paid Total (PHP)</div></div>
    </div>

    <div class="chart-card">
      <div class="flow-actions" style="justify-content:space-between;">
        <h3 style="font-size:0.95rem;font-weight:600;">Payables</h3>
        <button class="btn btn-sm btn-secondary" onclick="loadAP()">Refresh</button>
      </div>
      <div id="container" style="overflow-x:auto;"><div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div></div>
      <div id="msg" class="flow-msg" style="display:none;"></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/flow-docs.js"></script>
  <script src="js/flow-ap-aging.js"></script>
</body>
</html>
