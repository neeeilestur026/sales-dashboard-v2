<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounting Summary — Profit &amp; Expenses</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/bento-skin-director.css">
  <link rel="stylesheet" href="css/flow.css">
  <style>
    .report { max-width: 1180px; margin: 0 auto; }
    .report-sheet { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-card, var(--shadow-sm)); overflow: hidden; }
    .report-head { padding: 1.4rem 1.6rem; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; background: linear-gradient(180deg, #ffffff, #f6faf9); }
    .report-head h1 { margin: 0; font-size: 1.4rem; letter-spacing: -0.02em; }
    .report-head .meta { font-size: 0.82rem; color: var(--text-secondary); margin-top: 0.3rem; }
    .report-controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .report-controls select { padding: 0.45rem 0.6rem; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-primary); font-size: 0.85rem; }
    .report-body { padding: 1.4rem 1.6rem; }
    .as-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.7rem; margin-bottom: 1.6rem; }
    .as-kpi { border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 0.9rem; background: var(--bg-card); min-width: 0; }
    .as-kpi .l { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 700; }
    .as-kpi .v { font-size: clamp(0.92rem, 1.7vw, 1.25rem); font-weight: 700; color: var(--text-primary); margin-top: 0.15rem; font-variant-numeric: tabular-nums; line-height: 1.2; overflow-wrap: anywhere; word-break: break-word; }
    .as-grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.2rem; margin-bottom: 1.6rem; }
    .as-sect-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin: 0 0 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; cursor: pointer; user-select: none; }
    .as-sect-title:hover { color: var(--accent-dark, var(--accent)); }
    .as-sect-title .pill { margin-left: 0.4rem; background: var(--accent-light); color: var(--accent-dark); padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.68rem; }
    .as-chevron { display: inline-flex; transition: transform 0.25s ease; color: var(--text-muted); }
    .as-sect.collapsed .as-chevron { transform: rotate(-90deg); }
    .as-sect.collapsed .as-sect-body { display: none; }
    .as-sect.collapsed .as-sect-title { margin-bottom: 0; }
    .as-pl { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .as-pl td { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
    .as-pl td.n { text-align: right; font-variant-numeric: tabular-nums; }
    .as-pl tr.bold td { font-weight: 700; color: var(--text-primary); }
    .as-pl tr.final td { font-size: 0.95rem; }
    .as-sect { margin-bottom: 1.6rem; }
    .dr-empty { padding: 0.9rem; text-align: center; color: var(--text-muted); font-size: 0.82rem; font-style: italic; }
    @media print {
      .navbar, .no-print { display: none !important; }
      body { background: #fff; }
      .main-content { padding: 0 !important; margin: 0 !important; }
      .report-sheet { border: none; box-shadow: none; }
      .as-kpi, table, .as-sect { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="report">
      <div class="report-sheet">
        <div class="report-head">
          <div>
            <h1>Accounting Summary</h1>
            <div class="meta" id="reportMeta">—</div>
          </div>
          <div class="report-controls no-print">
            <select id="yearSel"></select>
            <select id="monthSel">
              <option value="">All months</option>
              <option value="01">January</option><option value="02">February</option><option value="03">March</option>
              <option value="04">April</option><option value="05">May</option><option value="06">June</option>
              <option value="07">July</option><option value="08">August</option><option value="09">September</option>
              <option value="10">October</option><option value="11">November</option><option value="12">December</option>
            </select>
            <button class="btn btn-sm btn-secondary" id="refreshBtn">Refresh</button>
            <button class="btn btn-sm btn-primary" id="printBtn">Print</button>
          </div>
        </div>
        <div class="report-body" id="reportBody">
          <div class="dr-empty">Loading…</div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/accounting-summary.js"></script>
</body>
</html>
