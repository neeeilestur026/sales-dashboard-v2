<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — Clients</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
  <link rel="stylesheet" href="css/bento-skin-v2.css">
  <link rel="stylesheet" href="css/flow-screen.css">
</head>
<body class="flow-screen">
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="hband">
      <div class="left">
        <div class="dpill"><span class="d" id="hbDay">—</span><span class="m" id="hbMon">&nbsp;</span></div>
        <div><div class="eyebrow">Masters · Clients</div><h1>Client Master</h1><p>Contact &amp; address details, kept here once so a purchase request and its quotation auto-fill them.</p></div>
      </div>
      <a class="btn btn-secondary" onclick="loadClients()">&#8635; Refresh</a>
    </div>
    <div class="flow-nav" id="flowNav"></div>

    <div class="chart-card">
      <h3 id="formTitle" style="font-size:0.95rem;font-weight:600;margin-bottom:0.6rem;">New Client</h3>
      <div class="flow-form">
        <div><label>Customer *</label><input type="text" id="cName" placeholder="e.g. Aboitiz Power Corporation"></div>
        <div><label>Contact Person</label><input type="text" id="cContact"></div>
        <div><label>Designation</label><input type="text" id="cDesignation"></div>
        <div><label>Email</label><input type="text" id="cEmail"></div>
        <div><label>Phone</label><input type="text" id="cPhone"></div>
        <div><label>RFQ Ref</label><input type="text" id="cRfq"></div>
        <div><label>Payment Terms</label><input type="text" id="cTerms" placeholder="e.g. 30 days"></div>
        <div class="full"><label>Address</label><input type="text" id="cAddress"></div>
        <div class="full"><label>Notes</label><input type="text" id="cNotes"></div>
      </div>
      <div class="flow-actions">
        <button class="btn btn-primary" id="saveBtn" onclick="saveClientRec()">Save Client</button>
        <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
      </div>
      <div id="formMsg" class="flow-msg" style="display:none;"></div>
    </div>

    <div class="chart-card">
      <div class="flow-actions" style="justify-content:space-between;">
        <h3 style="font-size:0.95rem;font-weight:600;">Clients</h3>
        <input type="text" id="cSearch" placeholder="Search…" style="max-width:220px;">
      </div>
      <div id="container" style="overflow-x:auto;"><div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div></div>
      <div id="msg" class="flow-msg" style="display:none;"></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/flow-clients.js"></script>
  <script>
    (function () {
      var d = new Date(), D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
          M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var dd = document.getElementById('hbDay'), mm = document.getElementById('hbMon');
      if (dd) dd.textContent = String(d.getDate()).padStart(2, '0');
      if (mm) mm.innerHTML = D[d.getDay()] + ',<br>' + M[d.getMonth()];
    })();
  </script>
</body>
</html>
