<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Team Analytics</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Chart.js loaded lazily via api.js -->
  <style>
    .tab-bar {
      display: flex; gap: 0.25rem; margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border, #334155);
      padding-bottom: 0;
    }
    .tab-btn {
      padding: 0.6rem 1.25rem; border: none; background: transparent;
      color: var(--text-muted, #64748b); font-family: inherit; font-size: 0.875rem;
      font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.2s;
    }
    .tab-btn:hover { color: var(--text-primary, #f1f5f9); }
    .tab-btn.active { color: var(--accent, #f97316); border-bottom-color: var(--accent, #f97316); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Target progress in leaderboard */
    .target-cell { min-width: 100px; }
    .target-text { font-size: 0.8rem; font-weight: 600; }
    .target-text .actual { color: var(--text-primary, #f1f5f9); }
    .target-text .sep { color: var(--text-muted, #64748b); }
    .target-text .goal { color: var(--text-muted, #64748b); font-weight: 400; }
    .target-bar { width: 100%; height: 4px; border-radius: 999px; background: #f8fafc; margin-top: 4px; overflow: hidden; }
    .target-bar-fill { height: 100%; border-radius: 999px; transition: width 0.5s; }
    .no-target { color: var(--text-muted, #64748b); font-size: 0.8rem; }

    /* Trend badge */
    .trend { display: inline-flex; align-items: center; gap: 0.2rem; font-size: 0.78rem; font-weight: 600; padding: 0.15rem 0.45rem; border-radius: 6px; }
    .trend-up { background: rgba(34,197,94,0.12); color: #22c55e; }
    .trend-down { background: rgba(239,68,68,0.12); color: #ef4444; }
    .trend-flat { background: rgba(148,163,184,0.1); color: #94a3b8; }
    .trend-new { background: rgba(59,130,246,0.12); color: #3b82f6; }

    /* Conversion rate */
    .conv-rate { font-size: 0.82rem; font-weight: 600; }
    .conv-good { color: #22c55e; }
    .conv-mid { color: #eab308; }
    .conv-low { color: #ef4444; }
    .conv-none { color: var(--text-muted, #64748b); }

    /* Activity tab styles */
    .toggle-bar {
      display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center;
    }
    .toggle-btn {
      padding: 0.45rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border, #334155);
      background: transparent; color: var(--text-muted, #64748b);
    }
    .toggle-btn.active {
      background: var(--accent, #f97316); color: #fff; border-color: var(--accent, #f97316);
    }
    .export-btns { margin-left: auto; display: flex; gap: 0.4rem; }
    .export-btn {
      padding: 0.35rem 0.7rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border, #334155);
      background: #f8fafc; color: var(--text-secondary, #94a3b8);
    }
    .export-btn:hover { background: #f1f5f9; color: var(--text-primary, #f1f5f9); }
    .summary-table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem;
    }
    .summary-table th {
      text-align: left; padding: 0.6rem 0.75rem;
      color: var(--text-muted, #64748b); border-bottom: 1px solid var(--border, #334155);
      font-weight: 600; white-space: nowrap;
    }
    .summary-table td {
      padding: 0.6rem 0.75rem; border-bottom: 1px solid #e2e8f0;
      color: var(--text-primary, #f1f5f9);
    }
    .summary-table tr:hover td { background: #e2e8f0; }
    .summary-table tfoot td {
      font-weight: 700; border-top: 2px solid var(--border, #334155);
      color: var(--accent, #f97316);
    }
    .zero { color: var(--text-muted, #64748b); }
    .chart-section { margin-top: 1.5rem; }
    .chart-section canvas { max-height: 300px; }
    .date-range-label { font-size: 0.82rem; color: var(--text-muted, #64748b); margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="main-content">
    <div class="page-header">
      <h1>Team Analytics</h1>
      <p>Monitor your team's performance and identify opportunities.</p>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabBtnDocs" onclick="switchTab('documents')">Documents</button>
      <button class="tab-btn" id="tabBtnActivity" onclick="switchTab('activity')">Activity</button>
    </div>

    <!-- ═══ DOCUMENTS TAB ═══ -->
    <div class="tab-panel active" id="tab-documents">
      <!-- Leaderboard -->
      <div class="section">
        <div class="flex justify-between items-center flex-wrap gap-1 mb-2">
          <h2 class="section-title" style="margin-bottom:0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            Team Leaderboard
          </h2>
          <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export CSV
          </button>
        </div>
        <div class="card">
          <div class="table-wrapper" id="leaderboardContainer">
            <div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading team data...</span></div>
          </div>
        </div>
      </div>

      <!-- Hot Leads -->
      <div class="section">
        <h2 class="section-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c1 3 2.5 3.5 3.5 4.5A5 5 0 0 1 17 10c0 3-2.5 5-5 5s-5-2-5-5a5 5 0 0 1 1.5-3.5C9.5 5.5 11 5 12 2z"/></svg>
          Hot Leads This Month
        </h2>
        <div class="card">
          <div class="table-wrapper" id="hotLeadsContainer">
            <div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading hot leads...</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ ACTIVITY TAB ═══ -->
    <div class="tab-panel" id="tab-activity">
      <div class="chart-card">
        <div class="toggle-bar">
          <button class="toggle-btn active" id="btnWeek" onclick="loadActivity('week')">This Week</button>
          <button class="toggle-btn" id="btnMonth" onclick="loadActivity('month')">This Month</button>
          <div class="export-btns">
            <button class="export-btn" onclick="exportActivityPDF()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              PDF
            </button>
            <button class="export-btn" onclick="exportActivityExcel()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Excel
            </button>
          </div>
        </div>
        <div id="activityRangeLabel" class="date-range-label"></div>
        <div id="activityContainer" style="overflow-x:auto;">
          <div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div>
        </div>
        <div class="chart-section" id="activityChartSection" style="display:none;">
          <h3 style="font-size:0.9rem;font-weight:600;margin-bottom:0.75rem;color:var(--text-secondary,#94a3b8);">Activity Breakdown by Agent</h3>
          <canvas id="activityChart"></canvas>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-team.js"></script>
</body>
</html>
