<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR-Marketing — Employee Masterlist</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .emp-form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }
    .emp-form .full { grid-column: 1 / -1; }
    .emp-form label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted, #64748b); margin-bottom: 0.25rem; }
    .emp-form input, .emp-form select, .emp-form textarea {
      width: 100%; padding: 0.5rem 0.7rem; background: var(--surface-2, #1e293b);
      border: 1px solid var(--border, #334155); border-radius: 8px;
      color: var(--text-primary, #f1f5f9); font-size: 0.875rem; font-family: inherit;
    }
    .emp-form textarea { resize: vertical; min-height: 60px; }
    .emp-form input:focus, .emp-form select:focus, .emp-form textarea:focus { outline: none; border-color: var(--accent, #f97316); }
    .emp-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .emp-table th { text-align: left; padding: 0.6rem 0.75rem; color: var(--text-muted, #64748b); border-bottom: 1px solid var(--border, #334155); font-weight: 600; white-space: nowrap; }
    .emp-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #e2e8f0; color: var(--text-primary, #f1f5f9); }
    .emp-table tr:hover td { background: #e2e8f0; }
    .status-badge { padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; }
    .status-pending { background: rgba(234,179,8,0.12); color: #eab308; }
    .status-complete { background: rgba(34,197,94,0.12); color: #22c55e; }
    .form-section { display: none; }
    .form-section.open { display: block; }
    .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .search-bar input { flex: 1; min-width: 200px; padding: 0.5rem 0.7rem; background: var(--surface-2, #1e293b); border: 1px solid var(--border, #334155); border-radius: 8px; color: var(--text-primary, #f1f5f9); font-size: 0.85rem; }
    .search-bar input:focus { outline: none; border-color: var(--accent, #f97316); }
    @media(max-width: 640px) { .emp-form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="main-content">
    <div class="page-header">
      <h1>Employee Masterlist</h1>
      <p>Manage employee records, onboarding status, and contact information.</p>
    </div>

    <!-- Add/Edit Form -->
    <div class="chart-card" style="margin-bottom:1.5rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <h3 style="font-size:0.95rem;font-weight:600;color:var(--text-primary,#f1f5f9);display:flex;align-items:center;gap:0.4rem;" id="formTitle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Employee
        </h3>
        <button class="btn btn-sm btn-secondary" onclick="toggleForm()">
          <span id="toggleLabel">Show Form</span>
        </button>
      </div>

      <div id="formSection" class="form-section">
        <form id="empForm" onsubmit="submitEmployee(event)">
          <input type="hidden" id="editRowIndex" value="">
          <div class="emp-form">
            <div>
              <label for="empName">Employee Name <span style="color:#ef4444;">*</span></label>
              <input type="text" id="empName" placeholder="e.g. Juan Dela Cruz" required>
            </div>
            <div>
              <label for="empPosition">Position <span style="color:#ef4444;">*</span></label>
              <input type="text" id="empPosition" placeholder="e.g. HR Officer" required>
            </div>
            <div>
              <label for="empDepartment">Department</label>
              <input type="text" id="empDepartment" placeholder="e.g. Human Resources">
            </div>
            <div>
              <label for="empDateHired">Date Hired</label>
              <input type="date" id="empDateHired">
            </div>
            <div>
              <label for="empBirthdate">Birthdate</label>
              <input type="date" id="empBirthdate">
            </div>
            <div>
              <label for="empOnboarding">Onboarding Status</label>
              <select id="empOnboarding">
                <option value="Pending">Pending</option>
                <option value="Complete">Complete</option>
              </select>
            </div>
            <div>
              <label for="empContact">Contact Info</label>
              <input type="text" id="empContact" placeholder="e.g. 09xx-xxx-xxxx / email">
            </div>
            <div class="full">
              <label for="empNotes">Notes</label>
              <textarea id="empNotes" placeholder="Additional notes..."></textarea>
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary" id="submitBtn">Add Employee</button>
            <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancel</button>
          </div>
        </form>
        <div id="formMsg" style="display:none;padding:0.5rem;border-radius:8px;font-size:0.85rem;margin-top:0.5rem;"></div>
      </div>
    </div>

    <!-- Employee Table -->
    <div class="chart-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem;">
        <h3 style="font-size:0.95rem;font-weight:600;color:var(--text-primary,#f1f5f9);">All Employees</h3>
        <div id="empCount" style="font-size:0.8rem;color:var(--text-muted,#64748b);"></div>
      </div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by name, position, or department..." oninput="renderTable()">
      </div>
      <div id="empContainer" style="overflow-x:auto;">
        <div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/hr-employees.js"></script>
</body>
</html>
