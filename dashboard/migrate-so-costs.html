<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migrate SO Cost Details — Profit Report → Flow</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
  <style>
    .report { max-width: 1280px; margin: 0 auto; }
    .report-sheet { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-card, var(--shadow-sm)); overflow: hidden; }
    .report-head { padding: 1.4rem 1.6rem; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; background: linear-gradient(180deg, #ffffff, #f6faf9); }
    .report-head h1 { margin: 0; font-size: 1.4rem; letter-spacing: -0.02em; }
    .report-head .meta { font-size: 0.82rem; color: var(--text-secondary); margin-top: 0.3rem; }
    .report-body { padding: 1.4rem 1.6rem; }
    .mig-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.7rem; margin-bottom: 1.3rem; }
    .mig-tile { border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 0.9rem; background: var(--bg-inset); }
    .mig-tile .l { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 700; }
    .mig-tile .v { font-size: clamp(0.95rem, 1.8vw, 1.3rem); font-weight: 800; color: var(--text-primary); margin-top: 0.15rem; font-variant-numeric: tabular-nums; }
    .mig-toolbar { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.9rem; }
    .mig-toolbar input, .mig-toolbar select { padding: 0.45rem 0.6rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; background: #fff; }
    .mig-prog { height: 8px; border-radius: 99px; background: var(--bg-inset); overflow: hidden; margin: 0.4rem 0 0.8rem; display: none; }
    .mig-prog > span { display: block; height: 100%; background: var(--accent); width: 0; transition: width .2s; }
    .mig-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .mig-table th { text-align: left; padding: 0.5rem 0.6rem; font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 700; border-bottom: 2px solid var(--border); background: var(--bg-inset); white-space: nowrap; }
    .mig-table th.num, .mig-table td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .mig-table td { padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); }
    .mig-badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.66rem; font-weight: 700; }
    .mig-badge.done { background: rgba(22,163,74,0.12); color: #15803d; }
    .mig-badge.pend { background: rgba(245,158,11,0.14); color: #b45309; }
    .mig-warn { color: #d97706; font-weight: 700; }
    .mig-link { background: none; border: none; color: var(--accent-dark, #0f766e); cursor: pointer; font-size: 0.78rem; font-weight: 600; padding: 0; }
    .mig-bd { background: #f8fafc; }
    .mig-bd table { width: 100%; max-width: 560px; border-collapse: collapse; font-size: 0.8rem; margin: 0.3rem 0; }
    .mig-bd td { padding: 0.25rem 0.5rem; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
    .mig-bd td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .mig-bd tr.tot td { font-weight: 800; color: var(--text-primary); border-top: 2px solid var(--border); border-bottom: none; }
    .dr-empty { padding: 1.4rem; text-align: center; color: var(--text-muted); font-style: italic; font-size: 0.86rem; }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="report">
      <div class="report-sheet">
        <div class="report-head">
          <div>
            <h1>Migrate SO Cost Details</h1>
            <div class="meta" id="migMeta">Each sales order's full cost breakdown from the old Profit Report → the new system. Idempotent — safe to re-run.</div>
          </div>
          <div style="display:flex;gap:0.5rem;align-items:center;">
            <button class="btn btn-sm btn-secondary" id="reloadBtn">Reload</button>
          </div>
        </div>
        <div class="report-body">
          <div class="mig-kpis" id="kpis"></div>
          <div class="mig-toolbar">
            <input type="text" id="search" placeholder="Search SO / customer…">
            <select id="statusFilter"><option value="">All</option><option value="pending">Pending only</option><option value="done">Migrated only</option></select>
            <select id="mismatchFilter"><option value="">All</option><option value="warn">COGS mismatch only</option></select>
            <button class="btn btn-sm btn-secondary" id="selAllBtn">Select all pending</button>
            <span class="spacer" style="margin-left:auto;"></span>
            <button class="btn btn-sm btn-secondary" id="migSelBtn">Migrate selected</button>
            <button class="btn btn-sm btn-primary" id="migAllBtn">Migrate all pending</button>
          </div>
          <div class="mig-prog" id="prog"><span id="progBar"></span></div>
          <div id="container"><div class="dr-empty">Loading…</div></div>
          <div id="msg" class="flow-msg" style="display:none;margin-top:0.75rem;"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/migrate-so-costs.js"></script>
</body>
</html>
