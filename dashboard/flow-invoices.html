<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — Invoices</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
  <style id="bento-skin">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root{
      --accent:#4f46e5; --accent-hover:#4338ca; --accent-dark:#3730a3; --accent-light:#e0e7ff;
      --accent-ring:rgba(79,70,229,.18);
      --radius:16px; --radius-lg:20px; --radius-sm:10px;
    }
    body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:radial-gradient(1100px 560px at 12% -8%,#eef1f5,#eef2f6 60%) !important;}
    .page-header h1{font:800 26px/1 'Inter',sans-serif !important;letter-spacing:-.02em;}
    .page-header p{font:400 13.5px 'Inter',sans-serif;color:var(--text-muted);}
    .chart-card,.stat-card,.kpi-card{border-radius:18px !important;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -18px rgba(15,23,42,.35) !important;border:1px solid var(--border) !important;}
    .btn,.btn-primary,.btn-secondary,.btn-sm{border-radius:999px !important;font-weight:600 !important;transition:transform .18s cubic-bezier(.4,0,.2,1),filter .18s,background .2s !important;}
    .btn-primary{background:linear-gradient(180deg,#6a63ea,#4f46e5) !important;color:#fff !important;border:none !important;box-shadow:0 6px 16px -8px rgba(79,70,229,.7) !important;}
    .btn-primary:hover{filter:brightness(1.06);transform:translateY(-1px);}
    .btn-secondary{background:#fff !important;color:var(--text-primary) !important;border:1px solid var(--border) !important;}
    input,select,textarea{border-radius:9px !important;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent) !important;box-shadow:0 0 0 3px var(--accent-ring) !important;}
    .flow-modal{border-radius:20px !important;}
    @media (prefers-reduced-motion:reduce){.btn,.btn-primary{transition:none !important;}}
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="page-header">
      <h1>Invoice / Materials Issuance</h1>
      <p>Load a sales order; selling price comes from the order and COGS from inventory landed cost. Saving deducts inventory.</p>
    </div>
    <div class="flow-nav" id="flowNav"></div>

    <div class="chart-card" style="margin-bottom:1.25rem;">
      <h3 style="font-size:0.95rem;font-weight:600;margin-bottom:0.75rem;">New Invoice</h3>
      <div class="flow-form">
        <div><label>Load Sales Order *</label><select id="loadSO" onchange="loadFromSO()"></select></div>
        <div><label>Source SO No</label><input type="text" id="soNo" readonly></div>
        <div><label>Customer *</label><input type="text" id="customer"></div>
        <div><label>Invoice No <span style="font-weight:400;color:var(--text-muted,#64748b);">(optional — auto if blank)</span></label><input type="text" id="invNo" placeholder="auto-generated"></div>
        <div><label>Date</label><input type="date" id="date"></div>
      </div>

      <table class="flow-table flow-items" style="margin-top:0.5rem;">
        <thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Selling Price</th><th class="num">Line Sales</th><th class="num">Landed/Unit (COGS)</th><th class="num">Line COGS</th></tr></thead>
        <tbody id="itemRows"></tbody>
      </table>
      <div class="flow-actions" style="gap:1.5rem;justify-content:flex-end;font-weight:700;">
        <span>Total Sales: <span id="totalSales">0.00</span></span>
        <span>Total COGS: <span id="totalCOGS">0.00</span></span>
        <span>Gross Profit: <span id="grossProfit">0.00</span></span>
      </div>

      <div class="flow-actions">
        <button type="button" class="btn btn-primary" id="saveBtn" onclick="saveInvoice()">Issue Invoice &amp; Deduct Inventory</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
      </div>
      <div id="formMsg" class="flow-msg" style="display:none;"></div>
    </div>

    <div class="chart-card">
      <div class="flow-actions" style="justify-content:space-between;">
        <h3 style="font-size:0.95rem;font-weight:600;">Invoices</h3>
        <button class="btn btn-sm btn-secondary" onclick="loadInvoices()">Refresh</button>
      </div>
      <div id="listContainer" style="overflow-x:auto;"><div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/flow-docs.js"></script>
  <script src="js/flow-invoices.js"></script>
</body>
</html>
