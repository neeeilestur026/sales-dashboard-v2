<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR-Marketing — Recruitment Pipeline</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .rec-form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }
    .rec-form .full { grid-column: 1 / -1; }
    .rec-form label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted, #64748b); margin-bottom: 0.25rem; }
    .rec-form input, .rec-form select, .rec-form textarea {
      width: 100%; padding: 0.5rem 0.7rem; background: var(--surface-2, #1e293b);
      border: 1px solid var(--border, #334155); border-radius: 8px;
      color: var(--text-primary, #f1f5f9); font-size: 0.875rem; font-family: inherit;
    }
    .rec-form textarea { resize: vertical; min-height: 60px; }
    .rec-form input:focus, .rec-form select:focus, .rec-form textarea:focus { outline: none; border-color: var(--accent, #f97316); }
    .rec-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .rec-table th { text-align: left; padding: 0.6rem 0.75rem; color: var(--text-muted, #64748b); border-bottom: 1px solid var(--border, #334155); font-weight: 600; white-space: nowrap; }
    .rec-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #e2e8f0; color: var(--text-primary, #f1f5f9); }
    .rec-table tr:hover td { background: #e2e8f0; }
    .stage-badge { padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; }
    .stage-posted { background: rgba(148,163,184,0.12); color: #94a3b8; }
    .stage-screening { background: rgba(234,179,8,0.12); color: #eab308; }
    .stage-initial { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .stage-final { background: rgba(168,85,247,0.12); color: #a855f7; }
    .stage-offer { background: rgba(249,115,22,0.12); color: #f97316; }
    .stage-onboarding { background: rgba(236,72,153,0.12); color: #ec4899; }
    .stage-complete { background: rgba(34,197,94,0.12); color: #22c55e; }
    .form-section { display: none; }
    .form-section.open { display: block; }
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }
    .mini-stat { background: var(--surface-2, #1e293b); border: 1px solid var(--border, #334155); border-radius: 10px; padding: 0.75rem 1rem; text-align: center; }
    .mini-stat .num { font-size: 1.5rem; font-weight: 700; color: var(--text-primary, #f1f5f9); }
    .mini-stat .lbl { font-size: 0.68rem; color: var(--text-muted, #64748b); margin-top: 0.15rem; }
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { padding: 0.45rem 0.6rem; background: var(--surface-2, #1e293b); border: 1px solid var(--border, #334155); border-radius: 8px; color: var(--text-primary, #f1f5f9); font-size: 0.82rem; }
    .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: var(--accent, #f97316); }
    @media(max-width: 640px) { .rec-form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="main-content">
    <div class="page-header">
      <h1>Recruitment Pipeline</h1>
      <p>Track candidates from application through onboarding.</p>
    </div>

    <!-- Stats -->
    <div class="stat-cards" id="statsRow"></div>

    <!-- Add/Edit Form -->
    <div class="chart-card" style="margin-bottom:1.5rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <h3 style="font-size:0.95rem;font-weight:600;color:var(--text-primary,#f1f5f9);display:flex;align-items:center;gap:0.4rem;" id="formTitle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Candidate
        </h3>
        <button class="btn btn-sm btn-secondary" onclick="toggleForm()">
          <span id="toggleLabel">Show Form</span>
        </button>
      </div>

      <div id="formSection" class="form-section">
        <form id="recForm" onsubmit="submitCandidate(event)">
          <input type="hidden" id="editRowIndex" value="">
          <div class="rec-form">
            <div>
              <label for="candName">Candidate Name <span style="color:#ef4444;">*</span></label>
              <input type="text" id="candName" placeholder="e.g. Juan Dela Cruz" required>
            </div>
            <div>
              <label for="candPosition">Position <span style="color:#ef4444;">*</span></label>
              <input type="text" id="candPosition" placeholder="e.g. Marketing Associate" required>
            </div>
            <div>
              <label for="candStage">Stage</label>
              <select id="candStage">
                <option value="Job Posted">Job Posted</option>
                <option value="Resume Screening">Resume Screening</option>
                <option value="Initial Interview">Initial Interview</option>
                <option value="Final Interview">Final Interview</option>
                <option value="Job Offer">Job Offer</option>
                <option value="Onboarding">Onboarding</option>
                <option value="Complete">Complete</option>
              </select>
            </div>
            <div>
              <label for="candDate">Date Applied</label>
              <input type="date" id="candDate">
            </div>
            <div>
              <label for="candHR">Assigned HR</label>
              <input type="text" id="candHR" placeholder="e.g. Maria Santos">
            </div>
            <div class="full">
              <label for="candNotes">Notes</label>
              <textarea id="candNotes" placeholder="Additional notes..."></textarea>
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary" id="submitBtn">Add Candidate</button>
            <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancel</button>
          </div>
        </form>
        <div id="formMsg" style="display:none;padding:0.5rem;border-radius:8px;font-size:0.85rem;margin-top:0.5rem;"></div>
      </div>
    </div>

    <!-- Pipeline Table -->
    <div class="chart-card">
      <h3 style="font-size:0.95rem;font-weight:600;color:var(--text-primary,#f1f5f9);margin-bottom:0.75rem;">All Candidates</h3>
      <div class="filter-bar">
        <select id="filterStage" onchange="renderTable()">
          <option value="">All Stages</option>
          <option value="Job Posted">Job Posted</option>
          <option value="Resume Screening">Resume Screening</option>
          <option value="Initial Interview">Initial Interview</option>
          <option value="Final Interview">Final Interview</option>
          <option value="Job Offer">Job Offer</option>
          <option value="Onboarding">Onboarding</option>
          <option value="Complete">Complete</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search candidates..." oninput="renderTable()">
      </div>
      <div id="recContainer" style="overflow-x:auto;">
        <div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/hr-recruitment.js"></script>
</body>
</html>
