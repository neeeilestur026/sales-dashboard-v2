<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi-Escorp Portal — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <img src="images/logo-login.png" alt="Hi-Escorp">
      </div>

      <p class="login-subtitle">Sign in to your account</p>

      <!-- Error Message -->
      <div id="errorMsg" class="error-message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span id="errorText">Invalid username or password</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="form-input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" class="form-input" placeholder="Enter your username" autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="form-input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary btn-lg btn-block">
          <span id="loginBtnText">Sign In</span>
          <div id="loginSpinner" class="spinner" style="display:none;"></div>
        </button>
      </form>
      <p style="text-align:center;margin-top:0.75rem;font-size:0.8rem;color:#94a3b8;">Forgot your password? Contact your administrator.</p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Auto-redirect if already logged in
    (function() {
      const session = getSession();
      if (session) {
        if (session.role === 'admin') window.location.href = 'admin.html';
        else if (session.role === 'accounting') window.location.href = 'accounting-home.html';
        else if (session.role === 'management') window.location.href = 'management-home.html';
        else if (session.role === 'director') window.location.href = 'director-home.html';
        else if (session.role === 'hr') window.location.href = 'hr-home.html';
        else window.location.href = 'dashboard.html';
      }
    })();

    async function handleLogin(e) {
      e.preventDefault();

      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');
      const loginBtn = document.getElementById('loginBtn');
      const loginBtnText = document.getElementById('loginBtnText');
      const loginSpinner = document.getElementById('loginSpinner');

      // Hide previous error
      errorMsg.classList.remove('visible');

      // Show loading state
      loginBtn.disabled = true;
      loginBtnText.textContent = 'Signing in...';
      loginSpinner.style.display = 'block';

      try {
        const result = await apiLogin(user, pass);

        if (result.success) {
          saveSession(result);
          // Single source of truth for role→home (covers marketing etc. — auth.js)
          window.location.href = _homeForRole(result.role);
        } else {
          errorText.textContent = result.message || 'Invalid username or password';
          errorMsg.classList.add('visible');
        }
      } catch (err) {
        errorText.textContent = 'Unable to connect to server. Please try again.';
        errorMsg.classList.add('visible');
      } finally {
        loginBtn.disabled = false;
        loginBtnText.textContent = 'Sign In';
        loginSpinner.style.display = 'none';
      }
    }
  </script>
</body>
</html>
