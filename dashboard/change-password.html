<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi-Escorp Portal — Change Password</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/bento-skin.css">
  <style>
    .password-form {
      max-width: 420px;
    }
    .password-form .form-group { margin-bottom: 1rem; }
    .password-form label {
      display: block; font-size: 0.82rem; font-weight: 500;
      color: var(--text-muted, #64748b); margin-bottom: 0.35rem;
    }
    .password-form input[type="password"] {
      width: 100%; padding: 0.55rem 0.75rem;
      background: var(--surface-2, #1e293b);
      border: 1px solid var(--border, #334155);
      border-radius: 8px; color: var(--text-primary, #f1f5f9);
      font-size: 0.875rem;
    }
    .password-form input[type="password"]::placeholder { color: var(--text-muted, #64748b); }
    .form-msg { margin-top: 1rem; font-size: 0.85rem; font-weight: 500; }
    .form-msg.success { color: #22c55e; }
    .form-msg.error { color: #ef4444; }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="main-content">
    <div class="page-header">
      <h1>Change Password</h1>
      <p>Update your account password.</p>
    </div>

    <div class="chart-card">
      <div class="password-form">
        <div class="form-group">
          <label for="currentPass">Current Password</label>
          <input type="password" id="currentPass" placeholder="Enter current password" autocomplete="current-password">
        </div>
        <div class="form-group">
          <label for="newPass">New Password</label>
          <input type="password" id="newPass" placeholder="Enter new password (min 6 characters)">
        </div>
        <div class="form-group">
          <label for="confirmPass">Confirm New Password</label>
          <input type="password" id="confirmPass" placeholder="Re-enter new password">
        </div>
        <button class="btn btn-primary" id="changeBtn" onclick="changePassword()">Change Password</button>
        <div id="formMsg" class="form-msg"></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const session = requireAuth();
    if (session) {
      renderNavbar('change-password');
    }

    async function changePassword() {
      const msgEl = document.getElementById('formMsg');
      msgEl.textContent = '';
      msgEl.className = 'form-msg';

      const currentPass = document.getElementById('currentPass').value;
      const newPass = document.getElementById('newPass').value;
      const confirmPass = document.getElementById('confirmPass').value;

      if (!currentPass || !newPass || !confirmPass) {
        msgEl.textContent = 'Please fill in all fields.';
        msgEl.className = 'form-msg error';
        return;
      }

      if (newPass.length < 6) {
        msgEl.textContent = 'New password must be at least 6 characters.';
        msgEl.className = 'form-msg error';
        return;
      }

      if (newPass !== confirmPass) {
        msgEl.textContent = 'New passwords do not match.';
        msgEl.className = 'form-msg error';
        return;
      }

      const btn = document.getElementById('changeBtn');
      btn.disabled = true;
      btn.textContent = 'Changing...';

      try {
        const result = await apiChangePassword(session.username, currentPass, newPass);
        if (result.success) {
          msgEl.textContent = 'Password changed successfully! You will be logged out.';
          msgEl.className = 'form-msg success';
          setTimeout(() => logout(), 2000);
        } else {
          msgEl.textContent = result.message || 'Failed to change password.';
          msgEl.className = 'form-msg error';
          btn.disabled = false;
          btn.textContent = 'Change Password';
        }
      } catch (err) {
        msgEl.textContent = 'Error: ' + err.message;
        msgEl.className = 'form-msg error';
        btn.disabled = false;
        btn.textContent = 'Change Password';
      }
    }
  </script>
</body>
</html>
