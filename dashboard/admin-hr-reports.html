<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — HR Daily Reports</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
    .filter-bar input { padding: 0.5rem 0.7rem; background: var(--surface-2, #1e293b); border: 1px solid var(--border, #334155); border-radius: 8px; color: var(--text-primary, #f1f5f9); font-size: 0.85rem; }
    .filter-bar input:focus { outline: none; border-color: var(--accent, #f97316); }
    .hr-report-card {
      background: var(--surface-2, #1e293b); border: 1px solid var(--border, #334155);
      border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem;
    }
    .hr-report-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; cursor: pointer;
    }
    .hr-report-header h4 { font-size: 0.9rem; font-weight: 600; color: var(--text-primary, #f1f5f9); margin: 0; }
    .hr-report-meta { font-size: 0.75rem; color: var(--text-muted, #64748b); }
    .hr-report-body { display: none; }
    .hr-report-body.open { display: block; }
    .section-label { font-size: 0.78rem; font-weight: 600; color: var(--accent, #f97316); text-transform: uppercase; letter-spacing: 0.05em; margin: 0.75rem 0 0.4rem; }
    .activity-item { background: #e2e8f0; border-radius: 8px; padding: 0.5rem 0.75rem; margin-bottom: 0.35rem; font-size: 0.82rem; }
    .activity-item .tag { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; background: rgba(59,130,246,0.12); color: #3b82f6; margin-right: 0.4rem; }
    .no-data { text-align: center; padding: 2rem; color: var(--text-muted, #64748b); }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main class="main-content">
    <div class="page-header">
      <h1>HR Daily Reports</h1>
      <p>View daily submissions from the HR-Marketing team.</p>
    </div>

    <div class="chart-card">
      <div class="filter-bar">
        <input type="date" id="filterDate" onchange="loadReports()">
        <button class="btn btn-sm btn-secondary" onclick="setToday()">Today</button>
        <button class="btn btn-sm btn-secondary" onclick="exportExcel()" id="exportBtn" style="margin-left:auto;">Export Excel</button>
      </div>
      <div id="reportsContainer">
        <div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-hr-reports.js"></script>
</body>
</html>
