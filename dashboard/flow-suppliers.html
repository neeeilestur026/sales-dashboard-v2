<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — Suppliers</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
  <link rel="stylesheet" href="css/bento-skin-v2.css">
  <link rel="stylesheet" href="css/flow-screen.css">
</head>
<body class="flow-screen">
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="hband">
      <div class="left">
        <div class="dpill"><span class="d" id="hbDay">—</span><span class="m" id="hbMon">&nbsp;</span></div>
        <div><div class="eyebrow">Masters · Suppliers</div><h1>Supplier Master</h1><p>Bank &amp; payment details, kept here once so a payment request auto-fills them instead of re-typing every time.</p></div>
      </div>
      <a class="btn btn-secondary" onclick="loadSuppliers()">&#8635; Refresh</a>
    </div>
    <div class="flow-nav" id="flowNav"></div>

    <div class="chart-card">
      <h3 id="formTitle" style="font-size:0.95rem;font-weight:600;margin-bottom:0.6rem;">New Supplier</h3>
      <div class="flow-form">
        <div><label>Supplier *</label><input type="text" id="sName" placeholder="e.g. Power Team Hydraulic Technologies"></div>
        <div><label>Bank Name</label><input type="text" id="sBank"></div>
        <div><label>Account Name</label><input type="text" id="sAcctName"></div>
        <div><label>Account Number</label><input type="text" id="sAcctNo"></div>
        <div><label>Payment Method</label><input type="text" id="sMethod" placeholder="Bank Transfer / Cheque / …"></div>
        <div><label>Currency</label><input type="text" id="sCurrency" placeholder="PHP / USD / …"></div>
        <div><label>TIN</label><input type="text" id="sTin"></div>
        <div class="full"><label>Address</label><input type="text" id="sAddress"></div>
        <div class="full"><label>Notes</label><input type="text" id="sNotes"></div>
      </div>
      <div class="flow-actions">
        <button class="btn btn-primary" id="saveBtn" onclick="saveSupplierRec()">Save Supplier</button>
        <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
      </div>
      <div id="formMsg" class="flow-msg" style="display:none;"></div>
    </div>

    <div class="chart-card">
      <div class="flow-actions" style="justify-content:space-between;">
        <h3 style="font-size:0.95rem;font-weight:600;">Suppliers</h3>
        <input type="text" id="sSearch" placeholder="Search…" style="max-width:220px;">
      </div>
      <div id="container" style="overflow-x:auto;"><div class="loading-overlay"><div class="spinner spinner-lg"></div><span>Loading...</span></div></div>
      <div id="msg" class="flow-msg" style="display:none;"></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/flow-suppliers.js"></script>
  <script>
    (function () {
      var d = new Date(), D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
          M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var dd = document.getElementById('hbDay'), mm = document.getElementById('hbMon');
      if (dd) dd.textContent = String(d.getDate()).padStart(2, '0');
      if (mm) mm.innerHTML = D[d.getDay()] + ',<br>' + M[d.getMonth()];
    })();
  </script>
</body>
</html>
