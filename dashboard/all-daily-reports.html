<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Daily Reports — Oversight</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
  <link rel="stylesheet" href="css/bento-skin-v2.css">
  <style>
    .report { max-width: 1100px; margin: 0 auto; }
    .report-sheet { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-card, var(--shadow-sm)); overflow: hidden; }
    .report-head { padding: 1.4rem 1.6rem; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; background: linear-gradient(180deg, #ffffff, #f6faf9); }
    .report-head h1 { margin: 0; font-size: 1.4rem; letter-spacing: -0.02em; }
    .report-head .meta { font-size: 0.82rem; color: var(--text-secondary); margin-top: 0.3rem; }
    .report-controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .report-controls input, .report-controls select { padding: 0.45rem 0.6rem; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-primary); font-size: 0.85rem; }
    .report-body { padding: 1.4rem 1.6rem; }
    .dr-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .dr-tile { border: 1px solid var(--border); border-radius: 12px; padding: 0.8rem 0.95rem; background: var(--bg-card); }
    .dr-tile .l { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; }
    .dr-tile .v { font-size: 1.35rem; font-weight: 700; color: var(--text-primary); margin-top: 0.2rem; }
    .dr-sect-title { font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); margin: 0 0 0.55rem; display: flex; align-items: center; gap: 0.5rem; }
    .mod-badge { display: inline-block; padding: 0.12rem 0.5rem; border-radius: 999px; font-size: 0.68rem; font-weight: 700; background: var(--bg-inset); color: var(--text-secondary); white-space: nowrap; }
    .mod-Quotation { background: #f0fdfa; color: #0f766e; }
    .mod-SalesOrder, .mod-Sales\.Order { background: #f0fdf4; color: #15803d; }
    .mod-PurchaseOrder, .mod-Purchase\.Order { background: #eff6ff; color: #1d4ed8; }
    .mod-APAging, .mod-AP\.Aging { background: #fff7ed; color: #c2410c; }
    .mod-Receiving { background: #ecfeff; color: #0e7490; }
    .mod-Invoice { background: #f0fdfa; color: #0f766e; }
    .mod-Inventory { background: #f8fafc; color: #475569; }
    .mod-PricingRequest, .mod-Pricing\.Request { background: #fef3c7; color: #b45309; }
    .mod-Document { background: #f1f5f9; color: #475569; }
    .act-chip { font-size: 0.66rem; font-weight: 700; padding: 0.05rem 0.4rem; border-radius: 5px; background: var(--bg-inset); color: var(--text-secondary); }
    .dr-empty { padding: 0.9rem; text-align: center; color: var(--text-muted); font-size: 0.82rem; font-style: italic; }
    /* Per-user report card */
    .urep { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 0.9rem; overflow: hidden; background: var(--bg-card); }
    .urep > summary { list-style: none; cursor: pointer; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.7rem; background: var(--bg-inset, #f1f5f9); transition: background 0.15s ease; }
    .urep > summary::-webkit-details-marker { display: none; }
    .urep > summary::before { content: '▸'; color: var(--text-muted); transition: transform 0.15s ease; }
    .urep[open] > summary::before { transform: rotate(90deg); }
    .urep > summary:hover { background: var(--accent-light, #ccfbf1); }
    .urep .uname { font-weight: 700; color: var(--text-primary); }
    .urep .ustat { margin-left: auto; font-size: 0.78rem; color: var(--text-muted); font-weight: 600; font-variant-numeric: tabular-nums; }
    .urep-body { padding: 1rem; }
    .urep-note { margin-top: 0.7rem; padding: 0.6rem 0.8rem; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; font-size: 0.84rem; color: #78350f; white-space: pre-wrap; }
    .umods { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.7rem; }
    @media print {
      .navbar, .no-print { display: none !important; }
      body { background: #fff; }
      .main-content { padding: 0 !important; margin: 0 !important; }
      .report-sheet { border: none; box-shadow: none; }
      .urep { break-inside: avoid; }
      .urep > summary::before { display: none; }
      .urep-body { display: block !important; }
    }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="report">
      <div class="report-sheet">
        <div class="report-head">
          <div>
            <h1>All Daily Reports</h1>
            <div class="meta" id="reportMeta">—</div>
          </div>
          <div class="report-controls no-print">
            <input type="date" id="datePicker">
            <input type="text" id="userSearch" placeholder="Search user…" style="min-width:160px;">
            <button class="btn btn-sm btn-secondary" id="refreshBtn">Refresh</button>
            <button class="btn btn-sm btn-primary" id="printBtn">Print</button>
          </div>
        </div>
        <div class="report-body">
          <div class="dr-summary" id="summaryRow">
            <div class="dr-tile"><div class="l">Active Users</div><div class="v" id="sumUsers">—</div></div>
            <div class="dr-tile"><div class="l">Total Movements</div><div class="v" id="sumMovements">—</div></div>
            <div class="dr-tile"><div class="l">Documents Created</div><div class="v" id="sumDocs">—</div></div>
            <div class="dr-tile"><div class="l">Sales Invoiced</div><div class="v" id="sumSales">—</div></div>
            <div class="dr-tile"><div class="l">AP Paid</div><div class="v" id="sumPaid">—</div></div>
            <div class="dr-tile"><div class="l">PDFs Generated</div><div class="v" id="sumPdfs">—</div></div>
          </div>

          <div class="dr-sect-title">Reports by user <span class="mod-badge" id="userCount" style="margin-left:auto;">0</span></div>
          <div id="userReports"><div class="dr-empty">Loading…</div></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/all-daily-reports.js"></script>
</body>
</html>
