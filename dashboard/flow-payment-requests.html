<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Requests — Purchase Orders</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flow.css">
  <link rel="stylesheet" href="css/bento-skin-v2.css">
  <style>
    /* ══ Bento reference design — self-contained ══ */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root{--ac:#4f46e5;--acd:#3730a3;--soft:#e0e7ff;--card:#fff;--tile2:#eef2f6;--line:#d7dce3;--ink:#111827;--ink2:#8b93a1;
      /* also retint the styles.css tokens so the shared navbar header matches (same as director-home) */
      --accent:#4f46e5;--accent-hover:#4338ca;--accent-dark:#3730a3;--accent-light:#e0e7ff;--accent-ring:rgba(79,70,229,.18);}
    body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:radial-gradient(1100px 560px at 12% -8%,#eef1f5,#e6e9ee 60%) !important;}
    .main-content{max-width:1200px;margin:0 auto;padding:104px 24px 40px !important;}
    .pr-head h1{font:800 26px/1 'Inter',sans-serif;letter-spacing:-.02em;color:var(--ink);margin:0;}
    .pr-head p{font:400 13.5px 'Inter',sans-serif;color:var(--ink2);margin:7px 0 0;}
    .flow-nav{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1rem;}
    .flow-nav a,.flow-nav span{padding:8px 13px;border-radius:999px;font:600 12.5px 'Inter',sans-serif;color:#475569;background:#fff;border:1px solid var(--line);text-decoration:none;}
    .flow-nav a.active,.flow-nav .active{background:linear-gradient(180deg,#6a63ea,#4f46e5);color:#fff;border-color:#4f46e5;}
    .chart-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 22px;margin-bottom:1rem;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -18px rgba(15,23,42,.35);}
    .chart-card h3{font:700 15px 'Inter',sans-serif;color:var(--ink);margin:0;}
    .flow-form{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:8px;}
    @media(max-width:820px){.flow-form{grid-template-columns:1fr 1fr;}}
    @media(max-width:560px){.flow-form{grid-template-columns:1fr;}}
    .flow-form .full{grid-column:1/-1;}
    .flow-form label{display:block;font:600 11px 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.03em;color:var(--ink2);margin-bottom:6px;}
    .flow-form input,.flow-form select{width:100%;padding:10px 12px;background:#fff;border:1px solid var(--line);border-radius:9px;color:var(--ink);font:400 13px 'Inter',sans-serif;box-sizing:border-box;}
    .flow-form input:focus,.flow-form select:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(79,70,229,.18);}
    .flow-actions{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-top:16px;}
    .btn{border-radius:999px;padding:11px 20px;font:600 13px 'Inter',sans-serif;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .18s cubic-bezier(.4,0,.2,1);}
    .btn:hover{background:#f1f5f9;transform:translateY(-1px);}
    .btn-primary{background:linear-gradient(180deg,#6a63ea,#4f46e5);color:#fff;border:none;box-shadow:0 6px 16px -8px rgba(79,70,229,.7);}
    .btn-primary:hover{filter:brightness(1.06);}
    .btn-sm{padding:8px 15px;font-size:12.5px;}
    .flow-msg{margin-top:.6rem;font:500 13px 'Inter',sans-serif;}
    .loading-overlay{display:flex;align-items:center;justify-content:center;gap:.6rem;padding:2rem;color:var(--ink2);font:500 13px 'Inter',sans-serif;}
    .spinner{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>
  <main class="main-content">
    <div class="pr-head" style="margin-bottom:16px;">
      <h1>Payment Requests</h1>
      <p>Load a purchase order to request its supplier payment · approval Director → Management.</p>
    </div>

    <div id="flowNav" class="flow-nav"></div>

    <div class="chart-card" id="formCard">
      <h3 id="formTitle">New Payment Request (Purchase Order)</h3>
      <p style="font:400 12px 'Inter',sans-serif;color:var(--ink2);margin:5px 0 4px;">Approval: <b>Director → Management</b>. Generates the same PRF document as the old system.</p>
      <input type="hidden" id="prNo">
      <div class="flow-form">
        <div><label>Load Purchase Order *</label><select id="loadPO" onchange="loadFromPO()"></select></div>
        <div><label>Supplier / Payee *</label><input type="text" id="payee"></div>
        <div><label>Amount (PHP) *</label><input type="number" step="any" min="0" id="amount">
          <div id="apDupWarn" style="display:none;margin-top:0.3rem;font-size:0.75rem;font-weight:600;color:#d97706;"></div></div>
        <div><label>Payment Method</label><select id="paymentMethod"><option>Telegraphic Transfer</option><option>Bank Transfer</option><option>Cheque</option><option>Cash</option><option>Online</option></select></div>
        <div><label>Bank Name</label><input type="text" id="bankName"></div>
        <div><label>Account Name</label><input type="text" id="accountName"></div>
        <div><label>Account Number</label><input type="text" id="accountNumber"></div>
        <div><label>Due Date</label><input type="date" id="dueDate"></div>
        <div><label>Department</label><input type="text" id="department"></div>
        <div><label>PR No <span style="font-weight:400;color:var(--ink2);text-transform:none;">(optional)</span></label><input type="text" id="prNoInput" placeholder="auto-generated"></div>
        <div class="full"><label>Purpose</label><input type="text" id="purpose" placeholder="e.g. Supplier payment for PO-…"></div>
        <div class="full"><label>Remarks</label><input type="text" id="remarks"></div>
      </div>
      <div class="flow-actions">
        <button type="button" class="btn btn-primary" id="saveBtn" onclick="savePR()">Save Payment Request</button>
        <button type="button" class="btn" onclick="resetForm()">Reset</button>
      </div>
      <div id="formMsg" class="flow-msg" style="display:none;"></div>
    </div>

    <div class="chart-card">
      <div class="flow-actions" style="justify-content:space-between;margin-top:0;">
        <h3>Payment Requests (Purchase Orders)</h3>
        <button class="btn btn-sm" onclick="loadPRs()">Refresh</button>
      </div>
      <div id="listContainer" style="overflow-x:auto;margin-top:12px;"><div class="loading-overlay"><div class="spinner"></div><span>Loading...</span></div></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/flow-api.js"></script>
  <script src="js/flow-docs.js"></script>
  <script src="js/flow-payment-requests.js"></script>
</body>
</html>
